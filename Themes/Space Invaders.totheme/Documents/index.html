<!DOCTYPE html>
<html lang="">
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100vw;
      height: 100vh;
    }
    #game-container {
      width: 55vw;
      height: 55vh;
      margin-top: 50px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: auto;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>
  <script>
    // --- Canvas & Constants ---
    const canvas = document.getElementById('game');
    const ctx = canvas ? canvas.getContext('2d') : null;

    const W = 800, H = 600;
    canvas.width = W;
    canvas.height = H;

    const TOTAL_DURATION      = 180000; // 3 minutes in ms
    const GAME_OVER_DURATION   =  10000; // 10 seconds
    const SHOOT_DEADLINE       = 165000; // all enemies must be shot by 2m45s
    const ENEMY_COLS = 10, ENEMY_ROWS = 6;
    const TOTAL_ENEMIES = ENEMY_COLS * ENEMY_ROWS; // 60

    // --- Precise Timing Milestones ---
    const destructionMilestones = [];

    function generateMilestones() {
      const deadline = SHOOT_DEADLINE;
      const total = TOTAL_ENEMIES;

      let currentTime = 0;
      let remainingTime = deadline;
      let remainingEnemies = total;

      for (let i = 0; i < total - 1; i++) {
        const avg = remainingTime / remainingEnemies;
        // Jitter between 0.5 and 1.5 of average
        const interval = avg * (0.5 + Math.random());

        currentTime += interval;
        destructionMilestones.push(currentTime);

        remainingTime -= interval;
        remainingEnemies--;

        // Safety: don't let currentTime exceed deadline before the last one
        if (currentTime > deadline - 500) {
           currentTime = deadline - 500;
        }
      }

      // The 60th enemy is hit exactly at 165,000ms
      destructionMilestones.push(deadline);
      destructionMilestones.sort((a, b) => a - b);
    }
    generateMilestones();

    const COLOR_BG        = '#000000';
    // Per-row colors (7 rows, top to bottom)
    const ROW_COLORS = [
      '#ff4444', // row 0 — red
      '#ff9900', // row 1 — orange
      '#ffff00', // row 2 — yellow
      '#00ff88', // row 3 — mint
      '#00ffff', // row 4 — cyan
      '#4488ff', // row 5 — blue
      '#cc44ff'  // row 6 — purple
    ];
    const COLOR_ENEMY_A   = ROW_COLORS[0];
    const COLOR_PLAYER    = '#ffffff';
    const COLOR_BULLET    = '#ffffff';
    const COLOR_BOMB      = '#ff4444';
    const COLOR_EXPLOSION = '#ffff00';
    const COLOR_GAMEOVER  = '#00ff00';
    const COLOR_UFO       = '#ff2222';
    const COLOR_BARRIER   = '#00aa00';

    // ─── Sprite Data ─────────────────────────────────────────────────────────
    // Each sprite: array of 8 rows, each row is an 11-char binary string
    const SPRITES = {
      A: [ // crab — top row
        ['00100000100','00010001000','00111111100','01101110110',
         '11111111111','10111111101','10100000101','01011011010'],
        ['00100000100','10010001001','10111111101','11101110111',
         '11111111111','01111111110','00100000100','01000000010']
      ],
      B: [ // squid — middle rows
        ['00010000100','00001001000','00011111100','01110110111',
         '11111111111','10111111101','10000000001','01100110011'],
        ['00010000100','10001001001','10011111101','01110110111',
         '11111111111','01111111110','01000000010','10100110101']
      ],
      C: [ // octopus — bottom rows
        ['00111111100','11111111111','11101010111','11111111111',
         '00101010100','01000000010','10100000101','01000000010'],
        ['00111111100','11111111111','11101010111','11111111111',
         '00101010100','01011011010','10100000101','00011011000']
      ]
    };

    const PLAYER_SPRITE = [
      '00000100000',
      '00001110000',
      '00001110000',
      '11111111111',
      '11111111111',
      '11111111111'
    ];

    function spriteType(row) {
      if (row === 0) return 'A';
      if (row <= 2)  return 'B';
      return 'C';
    }

    function spriteColor(type, row) {
      return ROW_COLORS[Math.min(row, ROW_COLORS.length - 1)];
    }

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    // ─── Enemy Grid ───────────────────────────────────────────────────────────
    const ENEMY_W = 40, ENEMY_H = 28, ENEMY_PAD_X = 20, ENEMY_PAD_Y = 12;
    const GRID_OFFSET_X = 60, GRID_OFFSET_Y = 55;

    let enemies = [];
    for (let r = 0; r < ENEMY_ROWS; r++) {
      for (let c = 0; c < ENEMY_COLS; c++) {
        enemies.push({
          row: r, col: c,
          x: GRID_OFFSET_X + c * (ENEMY_W + ENEMY_PAD_X),
          y: GRID_OFFSET_Y + r * (ENEMY_H + ENEMY_PAD_Y),
          alive: true,
          type: spriteType(r),
          diving: false,
          diveProgress: 0,
          diveStartX: 0, diveStartY: 0,
          diveTargetX: 0, diveTargetY: 0,
          diveReturnX: 0, diveReturnY: 0
        });
      }
    }

    let gridDir = 1;
    let gridX = 0, gridY = 0;
    let gridTargetY = 0;          // smooth Y drop target
    let gridSpeed = 38; // px/s
    let gridVelocity = 0; // px/s, updated each frame (positive = right)
    let gridTargetVelocity = 0;   // desired velocity — gridVelocity lerps toward this
    let bounceCount = 0;   // total wall bounces so far
    const DROP_EVERY = 3;  // drop only every Nth bounce
    let spriteFrameTimer = 0;
    let spriteFrame = 0;

    function updateEnemies(delta) {
      spriteFrameTimer += delta;
      if (spriteFrameTimer > 500) {
        spriteFrame = 1 - spriteFrame;
        spriteFrameTimer = 0;
      }

      const alive = enemies.filter(e => e.alive && !e.diving);
      if (alive.length === 0) return;

      const minX = Math.min(...alive.map(e => e.x + gridX));
      const maxX = Math.max(...alive.map(e => e.x + gridX + ENEMY_W));

      if (gridDir === 1 && maxX >= W - 18) {
        gridDir = -1;
        bounceCount++;
        if (bounceCount % DROP_EVERY === 0) {
          const barrierTop = barriers.length > 0 ? barriers[0].y : H - 120;
          const bottomEnemyY = Math.max(...alive.map(e => e.y + gridTargetY + ENEMY_H));
          if (bottomEnemyY + 18 < barrierTop) {
            gridTargetY += 18;
          }
        }
      } else if (gridDir === -1 && minX <= 18) {
        gridDir = 1;
        bounceCount++;
        if (bounceCount % DROP_EVERY === 0) {
          const barrierTop = barriers.length > 0 ? barriers[0].y : H - 120;
          const bottomEnemyY = Math.max(...alive.map(e => e.y + gridTargetY + ENEMY_H));
          if (bottomEnemyY + 18 < barrierTop) {
            gridTargetY += 18;
          }
        }
      }

      // Speed up slightly as enemies are destroyed
      const ratio = alive.length / TOTAL_ENEMIES;
      const speed = gridSpeed * (1 + (1 - ratio) * 0.8);
      gridTargetVelocity = gridDir * speed;

      // Ease-in-out: smoothly lerp velocity toward target (soft direction changes)
      const lerpFactor = Math.min(1, delta / 300);
      gridVelocity += (gridTargetVelocity - gridVelocity) * lerpFactor;
      gridX += gridVelocity * (delta / 1000);

      // Smooth Y drops (ease toward target Y)
      const dy = gridTargetY - gridY;
      if (Math.abs(dy) > 0.5) {
        gridY += dy * Math.min(1, delta / 250);
      } else {
        gridY = gridTargetY;
      }
    }

    // ─── High-Resolution Sprite Rendering ─────────────────────────────────
    // Cache off-screen canvases for each sprite type/frame/color combo
    const spriteCache = {};

    function getSpriteKey(type, frame, color) {
      return type + frame + color;
    }

    function createHiResSprite(type, frame, color, w, h) {
      const oc = document.createElement('canvas');
      oc.width = w * 2; oc.height = h * 2; // 2x for crisp rendering
      const c = oc.getContext('2d');
      c.scale(2, 2);

      const cx = w / 2, cy = h / 2;

      // Parse color for gradient creation
      const r = parseInt(color.slice(1,3), 16);
      const g = parseInt(color.slice(3,5), 16);
      const b = parseInt(color.slice(5,7), 16);
      const bright = `rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`;
      const dark = `rgb(${Math.floor(r*0.4)},${Math.floor(g*0.4)},${Math.floor(b*0.4)})`;

      // Outer glow
      c.shadowColor = color;
      c.shadowBlur = 8;

      if (type === 'A') { // Crab
        const legSpread = frame === 0 ? 1 : -1;
        // Body
        const grad = c.createRadialGradient(cx, cy-2, 2, cx, cy-2, w*0.45);
        grad.addColorStop(0, bright);
        grad.addColorStop(0.6, color);
        grad.addColorStop(1, dark);
        c.fillStyle = grad;
        c.beginPath();
        c.ellipse(cx, cy - 2, w * 0.42, h * 0.32, 0, 0, Math.PI * 2);
        c.fill();
        // Eyes
        c.fillStyle = '#ffffff';
        c.beginPath();
        c.ellipse(cx - 7, cy - 6, 4, 5, 0, 0, Math.PI * 2);
        c.ellipse(cx + 7, cy - 6, 4, 5, 0, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#111';
        c.beginPath();
        c.arc(cx - 6, cy - 5, 2, 0, Math.PI * 2);
        c.arc(cx + 8, cy - 5, 2, 0, Math.PI * 2);
        c.fill();
        // Claws/antennae
        c.shadowBlur = 4;
        c.strokeStyle = color;
        c.lineWidth = 2.5;
        c.lineCap = 'round';
        c.beginPath();
        c.moveTo(cx - 14, cy - 8);
        c.lineTo(cx - 18, cy - 16 + legSpread * 3);
        c.lineTo(cx - 14, cy - 14 + legSpread * 2);
        c.moveTo(cx + 14, cy - 8);
        c.lineTo(cx + 18, cy - 16 + legSpread * 3);
        c.lineTo(cx + 14, cy - 14 + legSpread * 2);
        c.stroke();
        // Legs
        c.lineWidth = 2;
        for (let i = -1; i <= 1; i += 2) {
          c.beginPath();
          c.moveTo(cx + i * 10, cy + 6);
          c.lineTo(cx + i * 14, cy + 12 + legSpread * i * 2);
          c.stroke();
          c.beginPath();
          c.moveTo(cx + i * 5, cy + 7);
          c.lineTo(cx + i * 8, cy + 13 - legSpread * i * 2);
          c.stroke();
        }
      } else if (type === 'B') { // Squid
        const tentacleWave = frame === 0 ? 1 : -1;
        // Head (dome shape)
        const grad = c.createRadialGradient(cx, cy - 4, 2, cx, cy - 4, w * 0.4);
        grad.addColorStop(0, bright);
        grad.addColorStop(0.5, color);
        grad.addColorStop(1, dark);
        c.fillStyle = grad;
        c.beginPath();
        c.moveTo(cx - w * 0.35, cy + 2);
        c.quadraticCurveTo(cx - w * 0.38, cy - 12, cx, cy - 14);
        c.quadraticCurveTo(cx + w * 0.38, cy - 12, cx + w * 0.35, cy + 2);
        c.closePath();
        c.fill();
        // Eyes
        c.fillStyle = '#ffffff';
        c.beginPath();
        c.ellipse(cx - 6, cy - 5, 3.5, 4.5, 0, 0, Math.PI * 2);
        c.ellipse(cx + 6, cy - 5, 3.5, 4.5, 0, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#111';
        c.beginPath();
        c.arc(cx - 5, cy - 4, 1.8, 0, Math.PI * 2);
        c.arc(cx + 7, cy - 4, 1.8, 0, Math.PI * 2);
        c.fill();
        // Tentacles
        c.shadowBlur = 4;
        c.strokeStyle = color;
        c.lineWidth = 2.2;
        c.lineCap = 'round';
        const tentCount = 4;
        for (let i = 0; i < tentCount; i++) {
          const tx = cx - 10 + i * 7;
          const wave = tentacleWave * (i % 2 === 0 ? 3 : -3);
          c.beginPath();
          c.moveTo(tx, cy + 2);
          c.quadraticCurveTo(tx + wave, cy + 9, tx + wave * 0.5, cy + 14);
          c.stroke();
        }
      } else { // type C — Octopus
        const wobble = frame === 0 ? 1 : -1;
        // Rounded body
        const grad = c.createRadialGradient(cx, cy - 1, 3, cx, cy - 1, w * 0.44);
        grad.addColorStop(0, bright);
        grad.addColorStop(0.5, color);
        grad.addColorStop(1, dark);
        c.fillStyle = grad;
        c.beginPath();
        c.ellipse(cx, cy - 3, w * 0.40, h * 0.36, 0, 0, Math.PI * 2);
        c.fill();
        // Eyes
        c.fillStyle = '#ffffff';
        c.beginPath();
        c.ellipse(cx - 8, cy - 4, 4, 5, 0, 0, Math.PI * 2);
        c.ellipse(cx + 8, cy - 4, 4, 5, 0, 0, Math.PI * 2);
        c.fill();
        c.fillStyle = '#111';
        c.beginPath();
        c.arc(cx - 7, cy - 3, 2.2, 0, Math.PI * 2);
        c.arc(cx + 9, cy - 3, 2.2, 0, Math.PI * 2);
        c.fill();
        // Mouth
        c.strokeStyle = dark;
        c.lineWidth = 1.5;
        c.beginPath();
        c.arc(cx, cy + 3, 4, 0, Math.PI);
        c.stroke();
        // Tentacles (8 wavy legs)
        c.shadowBlur = 3;
        c.strokeStyle = color;
        c.lineWidth = 2;
        c.lineCap = 'round';
        for (let i = 0; i < 5; i++) {
          const tx = cx - 14 + i * 7;
          const wave = wobble * (i % 2 === 0 ? 4 : -4);
          c.beginPath();
          c.moveTo(tx, cy + 7);
          c.quadraticCurveTo(tx + wave, cy + 13, tx + wave * 1.2, cy + 14);
          c.stroke();
        }
      }

      // Highlight spot on body
      c.shadowBlur = 0;
      c.fillStyle = 'rgba(255,255,255,0.25)';
      c.beginPath();
      c.ellipse(cx - 4, cy - 8, 3, 2, -0.5, 0, Math.PI * 2);
      c.fill();

      return oc;
    }

    function drawSprite(x, y, type, frame, color) {
      const key = getSpriteKey(type, frame, color);
      if (!spriteCache[key]) {
        spriteCache[key] = createHiResSprite(type, frame, color, ENEMY_W, ENEMY_H);
      }
      const oc = spriteCache[key];
      ctx.drawImage(oc, 0, 0, oc.width, oc.height, x, y, ENEMY_W, ENEMY_H);
    }

    function renderEnemies() {
      // Draw non-diving enemies first, then diving enemies on top
      enemies.forEach(e => {
        if (!e.alive || e.diving) return;
        drawSprite(e.x + gridX, e.y + gridY, e.type, spriteFrame, spriteColor(e.type, e.row));
      });
      enemies.forEach(e => {
        if (!e.alive || !e.diving) return;
        drawSprite(e.x, e.y, e.type, spriteFrame, spriteColor(e.type, e.row));
      });
    }

    // ─── Player ───────────────────────────────────────────────────────────────
    const PLAYER_W = 44, PLAYER_H = 24;
    let player = {
      x: W / 2 - PLAYER_W / 2,
      y: H - 58,
      speed: 130,
      targetX: W / 2 - PLAYER_W / 2
    };

    let driftTimer = 0;
    let moveCommitTimer = 0;       // cooldown before accepting a new target
    const MOVE_COMMIT_TIME = 800;  // ms — commit to current direction before changing
    const MOVE_DEAD_ZONE = 60;     // px — ignore target changes smaller than this
    let playerVelocity = 0;        // current smoothed velocity

    function evadeToSafeX(threatX) {
      // Threats always override the commit timer and smoothing
      moveCommitTimer = 0;
      const clearance = 120; // move well clear of the threat
      if (threatX < W / 2) {
        player.targetX = Math.min(W - PLAYER_W - 30, threatX + clearance);
      } else {
        player.targetX = Math.max(30, threatX - clearance);
      }
    }

    // Returns the predicted X of a threat at the moment it reaches the player's Y.
    // Returns null if the threat won't reach the player or is already past.
    function predictedImpactX(threatX, threatY, threatVX, threatVY) {
      if (threatVY <= 0) return null; // moving up or stationary — no threat
      const timeToPlayer = (player.y - threatY) / threatVY;
      if (timeToPlayer < 0 || timeToPlayer > 3) return null; // already past or too far
      return threatX + threatVX * timeToPlayer;
    }

    function updatePlayer(delta, elapsed) {
      const playerCX = player.x + PLAYER_W / 2;
      let threatened = false;
      const EVASION_ZONE = ENEMY_W * 2 + PLAYER_W; // wide detection zone for divers

      // --- Threat 1 (HIGHEST PRIORITY): diving enemies ---
      // Check ALL diving enemies, even far away, and evade the closest one
      let closestDiverDist = Infinity;
      let closestDiverImpactX = null;
      enemies.forEach(e => {
        if (!e.alive || !e.diving) return;
        const diverCX = e.x + ENEMY_W / 2;
        const dx = e.diveTargetX - e.x;
        const dy = e.diveTargetY - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const vx = (dx / dist) * DIVE_SPEED;
        const vy = (dy / dist) * DIVE_SPEED;
        const impactX = predictedImpactX(diverCX, e.y, vx, vy);
        if (impactX !== null && Math.abs(impactX - playerCX) < EVASION_ZONE) {
          const diverDist = Math.abs(e.y - player.y);
          if (diverDist < closestDiverDist) {
            closestDiverDist = diverDist;
            closestDiverImpactX = impactX;
          }
          threatened = true;
        }
      });
      if (closestDiverImpactX !== null) {
        evadeToSafeX(closestDiverImpactX);
        // Override speed — move fast when evading divers
        player.speed = 300;
        // Force immediate velocity toward evasion target
        const evadeDx = player.targetX - player.x;
        playerVelocity = Math.sign(evadeDx) * player.speed;
      }

      // --- Threat 2: falling bombs ---
      if (!threatened) {
        bombs.forEach(b => {
          const impactX = predictedImpactX(b.x, b.y, 0, BOMB_SPEED);
          if (impactX !== null && Math.abs(impactX - playerCX) < PLAYER_W + 20) {
            evadeToSafeX(impactX);
            threatened = true;
          }
        });
      }

      // --- Threat 3: UFO bombs ---
      if (!threatened) {
        ufoBombs.forEach(b => {
          const impactX = predictedImpactX(b.x, b.y, 0, UFO_BOMB_SPEED);
          if (impactX !== null && Math.abs(impactX - playerCX) < PLAYER_W + 20) {
            evadeToSafeX(impactX);
            threatened = true;
          }
        });
      }

      if (!threatened) {
        moveCommitTimer = Math.max(0, moveCommitTimer - delta);

        const target = getNextTarget();
        const aliveEnemies = enemies.filter(e => e.alive);
        const milestoneIdx = TOTAL_ENEMIES - aliveEnemies.length;
        const targetMilestone = destructionMilestones[milestoneIdx] || SHOOT_DEADLINE;

        if (target) {
          const ex = target.diving ? target.x : target.x + gridX;
          const ey = target.diving ? target.y : target.y + gridY;
          // Predict where the enemy will be when the bullet arrives
          const travelTime = (player.y - ey) / BULLET_SPEED;
          const futureX = ex + (target.diving ? 0 : gridVelocity * travelTime) + ENEMY_W / 2;

          const candidateX = futureX - PLAYER_W / 2;
          const shift = Math.abs(candidateX - player.targetX);

          // Only change target if commit timer expired AND the change is significant
          if (moveCommitTimer <= 0 && shift > MOVE_DEAD_ZONE) {
            player.targetX = candidateX;
            moveCommitTimer = MOVE_COMMIT_TIME;
          }

          // If we are getting close to fireTime, move faster!
          const fireTime = targetMilestone - travelTime;
          const timeToFire = fireTime - elapsed;

          // Performance boost if we are behind
          player.speed = 130 + Math.max(0, (165000 - targetMilestone) / 1000);
          if (timeToFire < 500) player.speed += 50;
        } else {
          driftTimer += delta;
          if (driftTimer > 2200) {
            driftTimer = 0;
            player.targetX = 70 + Math.random() * (W - PLAYER_W - 140);
            moveCommitTimer = MOVE_COMMIT_TIME;
          }
        }
      }

      const dx = player.targetX - player.x;
      if (Math.abs(dx) > MOVE_DEAD_ZONE) {
        // Ease-in: gently accelerate toward desired direction
        // Scale speed down when close to target for ease-out approach
        const distRatio = Math.min(Math.abs(dx) / 150, 1); // 0..1
        const easedSpeed = player.speed * (0.3 + 0.7 * distRatio); // slow near target
        const desiredV = Math.sign(dx) * easedSpeed;
        playerVelocity += (desiredV - playerVelocity) * Math.min(1, delta / 350);
        player.x += playerVelocity * (delta / 1000);
      } else {
        // Ease-out: smoothly decelerate to stop
        playerVelocity *= Math.max(0, 1 - delta / 250);
        if (Math.abs(playerVelocity) < 3) {
          playerVelocity = 0;
          player.x = player.targetX;
        } else {
          player.x += playerVelocity * (delta / 1000);
        }
      }
      player.x = Math.max(10, Math.min(W - PLAYER_W - 10, player.x));
    }

    // Pre-render player ship canvases
    const playerCache = {};

    function createHiResPlayer(color, w, h) {
      const oc = document.createElement('canvas');
      oc.width = w * 2; oc.height = h * 2;
      const c = oc.getContext('2d');
      c.scale(2, 2);

      const cx = w / 2, cy = h / 2;
      const r = parseInt(color.slice(1,3), 16);
      const g = parseInt(color.slice(3,5), 16);
      const b = parseInt(color.slice(5,7), 16);
      const bright = `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
      const dark = `rgb(${Math.floor(r*0.5)},${Math.floor(g*0.5)},${Math.floor(b*0.5)})`;

      // Engine glow
      c.shadowColor = '#00aaff';
      c.shadowBlur = 10;

      // Ship body
      const grad = c.createLinearGradient(cx, 0, cx, h);
      grad.addColorStop(0, bright);
      grad.addColorStop(0.4, color);
      grad.addColorStop(1, dark);
      c.fillStyle = grad;

      // Main hull
      c.beginPath();
      c.moveTo(cx, 1);           // nose tip
      c.lineTo(cx + 6, 6);       // right of nose
      c.lineTo(cx + 8, 10);      // right shoulder
      c.lineTo(w - 2, h - 4);    // right wing tip
      c.lineTo(w - 2, h);        // right wing bottom
      c.lineTo(cx + 4, h - 3);   // right engine
      c.lineTo(cx - 4, h - 3);   // left engine
      c.lineTo(2, h);            // left wing bottom
      c.lineTo(2, h - 4);        // left wing tip
      c.lineTo(cx - 8, 10);      // left shoulder
      c.lineTo(cx - 6, 6);       // left of nose
      c.closePath();
      c.fill();

      // Cockpit
      c.shadowBlur = 0;
      const cockpitGrad = c.createRadialGradient(cx, 10, 1, cx, 10, 6);
      cockpitGrad.addColorStop(0, '#88ddff');
      cockpitGrad.addColorStop(0.7, '#2288cc');
      cockpitGrad.addColorStop(1, '#115577');
      c.fillStyle = cockpitGrad;
      c.beginPath();
      c.ellipse(cx, 10, 4, 5, 0, 0, Math.PI * 2);
      c.fill();

      // Wing details (panel lines)
      c.strokeStyle = 'rgba(255,255,255,0.2)';
      c.lineWidth = 0.8;
      c.beginPath();
      c.moveTo(cx - 3, h - 5);
      c.lineTo(6, h - 2);
      c.moveTo(cx + 3, h - 5);
      c.lineTo(w - 6, h - 2);
      c.stroke();

      // Engine nozzles glow
      c.fillStyle = '#00ccff';
      c.shadowColor = '#00ccff';
      c.shadowBlur = 6;
      c.beginPath();
      c.ellipse(cx - 5, h - 1, 2.5, 1.5, 0, 0, Math.PI * 2);
      c.fill();
      c.beginPath();
      c.ellipse(cx + 5, h - 1, 2.5, 1.5, 0, 0, Math.PI * 2);
      c.fill();

      // Highlight
      c.shadowBlur = 0;
      c.fillStyle = 'rgba(255,255,255,0.15)';
      c.beginPath();
      c.ellipse(cx - 3, 8, 3, 6, -0.3, 0, Math.PI * 2);
      c.fill();

      return oc;
    }

    function renderPlayer() {
      if (gamePhase === 'gameover') return;

      const color = (rechargeTimer > 0) ? '#4488ff' : COLOR_PLAYER;
      if (!playerCache[color]) {
        playerCache[color] = createHiResPlayer(color, PLAYER_W, PLAYER_H);
      }
      const oc = playerCache[color];
      ctx.drawImage(oc, 0, 0, oc.width, oc.height, player.x, player.y, PLAYER_W, PLAYER_H);

      // Recharge bar with gradient
      if (rechargeTimer > 0) {
        const barW = (rechargeTimer / RECHARGE_DELAY) * PLAYER_W;
        const grad = ctx.createLinearGradient(player.x, 0, player.x + barW, 0);
        grad.addColorStop(0, '#ff2222');
        grad.addColorStop(1, '#ff6644');
        ctx.fillStyle = grad;
        ctx.fillRect(player.x, player.y + PLAYER_H + 5, barW, 3);
      }
    }

    // ─── Barriers ─────────────────────────────────────────────────────────────
    // 4 classic bunkers
    const BARRIER_COLS = 4;
    const barriers = [];
    for (let i = 0; i < BARRIER_COLS; i++) {
      const bx = 80 + i * ((W - 160) / (BARRIER_COLS - 1)) - 20;
      const by = H - 120;
      // Each barrier is a 4x3 block grid (each block 10x8)
      const blocks = [];
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 4; c++) {
          // Classic arch shape: skip bottom-left and bottom-right corners
          if (r === 2 && (c === 1 || c === 2)) continue;
          blocks.push({ r, c, hp: 3 });
        }
      }
      barriers.push({ x: bx, y: by, blocks });
    }

    function renderBarriers() {
      barriers.forEach(bar => {
        bar.blocks.forEach(bl => {
          const alpha = bl.hp / 3;
          if (alpha <= 0) return;
          ctx.globalAlpha = alpha;
          const bx = bar.x + bl.c * 10;
          const by = bar.y + bl.r * 8;
          // Gradient block with rounded corners
          const grad = ctx.createLinearGradient(bx, by, bx, by + 7);
          grad.addColorStop(0, '#22cc44');
          grad.addColorStop(1, '#006622');
          ctx.fillStyle = grad;
          // Rounded rect
          const radius = 1.5;
          ctx.beginPath();
          ctx.moveTo(bx + radius, by);
          ctx.lineTo(bx + 9 - radius, by);
          ctx.arcTo(bx + 9, by, bx + 9, by + radius, radius);
          ctx.lineTo(bx + 9, by + 7 - radius);
          ctx.arcTo(bx + 9, by + 7, bx + 9 - radius, by + 7, radius);
          ctx.lineTo(bx + radius, by + 7);
          ctx.arcTo(bx, by + 7, bx, by + 7 - radius, radius);
          ctx.lineTo(bx, by + radius);
          ctx.arcTo(bx, by, bx + radius, by, radius);
          ctx.closePath();
          ctx.fill();
          // Damage cracks when hp < 3
          if (bl.hp < 3) {
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(bx + 2, by + 1);
            ctx.lineTo(bx + 5, by + 4);
            ctx.lineTo(bx + 3, by + 6);
            ctx.stroke();
          }
          if (bl.hp < 2) {
            ctx.strokeStyle = 'rgba(0,0,0,0.5)';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(bx + 7, by + 2);
            ctx.lineTo(bx + 4, by + 5);
            ctx.stroke();
          }
        });
      });
      ctx.globalAlpha = 1;
    }

    // ─── Player Bullets ──────────────────────────────────────────────────────
    let bullets = [];
    let nextEnemyIndex = 0;
    let burstRemaining = 0;
    let burstTimer = 0;
    let rechargeTimer = 0;
    let currentShotIsBurst = false;
    const BURST_SHOT_DELAY  = 200;  // ms between shots in a burst
    const RECHARGE_DELAY    = 3000; // ms recharge after a burst
    const NORMAL_SHOT_DELAY = 800;  // ms recharge after a normal single shot

    function getNextTarget() {
      // Find enemies that are alive and not already targeted by an active bullet
      const targetedEnemies = bullets.map(b => b.targetEnemy);
      const alive = enemies.filter(e => e.alive && !e.diving && !targetedEnemies.includes(e));
      if (alive.length === 0) return null;

      // Urgency: if any enemy's bottom edge is at or below the barrier top, shoot those first
      const barrierTop = barriers.length > 0 ? barriers[0].y : H - 120;
      const urgent = alive.filter(e => (e.y + gridY + ENEMY_H) >= barrierTop);
      const pool = urgent.length > 0 ? urgent : alive;

      // Within the pool: bottom-to-top, left-to-right
      pool.sort((a, b) => (b.row - a.row) || (a.col - b.col));
      return pool[0];
    }

    const BULLET_SPEED = 420;

    function updateBullets(delta, elapsed) {
      if (gamePhase !== 'playing') return;

      const aliveEnemies = enemies.filter(e => e.alive);
      const enemiesAliveCount = aliveEnemies.length;
      if (enemiesAliveCount === 0) return;

      // Handle timers
      if (rechargeTimer > 0) {
        rechargeTimer -= delta;
      }
      if (burstTimer > 0) {
        burstTimer -= delta;
      }

      const milestoneIdx = TOTAL_ENEMIES - enemiesAliveCount;
      if (milestoneIdx >= TOTAL_ENEMIES) return;

      const targetMilestone = destructionMilestones[milestoneIdx];
      if (targetMilestone === undefined) return;
      const target = getNextTarget();

      if (target && rechargeTimer <= 0 && burstTimer <= 0) {
        // Start a new burst if we are ready and not currently in one
        if (burstRemaining <= 0) {
          // 80% chance: single shot (normal fire); 20% chance: burst of 3-5
          currentShotIsBurst = Math.random() >= 0.8;
          burstRemaining = currentShotIsBurst ? Math.floor(Math.random() * 3) + 3 : 1;
        }

        const ex = target.diving ? target.x : target.x + gridX;
        const ey = target.diving ? target.y : target.y + gridY;

        // Bullet travel time:
        const travelTime = (player.y - ey) / BULLET_SPEED;
        const fireTime = targetMilestone - travelTime;

        // Fire if we reached the required time
        if (elapsed >= fireTime) {
          // Predict future X accounting for bullet travel time
          const futureX = ex + (target.diving ? 0 : gridVelocity * travelTime) + ENEMY_W / 2;
          const px = player.x + PLAYER_W / 2;

          // Only shoot if aligned with predicted future position (within 15px)
          const aligned = Math.abs(futureX - px) < 15;
          const overdue = elapsed > fireTime + 300; // if more than 300ms overdue, just fire

          if (aligned || overdue) {
            // Compute horizontal velocity so the bullet angles toward the target
            const dx = futureX - px;
            const dy = player.y - ey; // vertical distance to target
            const vx = dy > 0 ? (dx / dy) * BULLET_SPEED : 0;

            bullets.push({
              x: px,
              y: player.y,
              vx: vx,
              targetEnemy: target,
              predictedX: futureX
            });

            burstRemaining--;
            if (burstRemaining > 0) {
              burstTimer = BURST_SHOT_DELAY;
            } else {
              rechargeTimer = currentShotIsBurst ? RECHARGE_DELAY : NORMAL_SHOT_DELAY;
            }
          }
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];

        b.y -= BULLET_SPEED * (delta / 1000);
        b.x += (b.vx || 0) * (delta / 1000);

        // Remove bullets that leave the screen
        if (b.y < -20) {
          bullets.splice(i, 1);
          continue;
        }

        // Remove bullets whose assigned target was already killed by another bullet
        if (!b.targetEnemy.alive) {
          bullets.splice(i, 1);
          continue;
        }

        // Check collision against ALL alive enemies, not just the assigned target
        let hit = false;
        for (let j = 0; j < enemies.length; j++) {
          const e = enemies[j];
          if (!e.alive) continue;
          const ex = (e.diving ? e.x : e.x + gridX) + ENEMY_W / 2;
          const ey = (e.diving ? e.y : e.y + gridY) + ENEMY_H / 2;

          if (b.y <= ey + ENEMY_H / 2 && b.y >= ey - ENEMY_H / 2 &&
              Math.abs(b.x - ex) < ENEMY_W / 2 + 4) {
            e.alive = false;
            e.diving = false;
            spawnExplosion(ex, ey, spriteColor(e.type, e.row));
            bullets.splice(i, 1);
            hit = true;

            if (enemies.filter(e => e.alive).length === 0) {
              console.log("FINAL ENEMY DESTROYED AT: " + elapsed + "ms");
            }
            break;
          }
        }
      }
    }

    function renderBullets() {
      bullets.forEach(b => {
        const bx = Math.round(b.x), by = Math.round(b.y);
        // Glow
        ctx.shadowColor = '#88ccff';
        ctx.shadowBlur = 10;
        // Bright core
        const grad = ctx.createLinearGradient(bx, by - 10, bx, by + 8);
        grad.addColorStop(0, 'rgba(136,204,255,0.2)');
        grad.addColorStop(0.3, '#ffffff');
        grad.addColorStop(0.7, '#88ccff');
        grad.addColorStop(1, 'rgba(136,204,255,0.1)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(bx, by - 1, 2.5, 9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    // ─── Explosions ───────────────────────────────────────────────────────────
    let explosions = [];

    function spawnExplosion(x, y, color) {
      const particles = [];
      const count = 22;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
        const speed = 40 + Math.random() * 90;
        const size = 2 + Math.random() * 4;
        const life = 0.5 + Math.random() * 0.5; // fraction of duration
        particles.push({
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          px: x, py: y,
          size,
          life,
          color: Math.random() < 0.4 ? '#ffffff' : (Math.random() < 0.5 ? '#ffff88' : color)
        });
      }
      // Add a few sparks that shoot further
      for (let i = 0; i < 6; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 120 + Math.random() * 80;
        particles.push({
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          px: x, py: y,
          size: 1.5,
          life: 0.6 + Math.random() * 0.4,
          color: '#ffffff'
        });
      }
      explosions.push({ x, y, color: color || COLOR_EXPLOSION, timer: 0, duration: 600, particles });
    }

    function spawnPlayerExplosion(x, y) {
      const particles = [];
      // 45 large standard particles
      for (let i = 0; i < 45; i++) {
        const angle = (i / 45) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
        const speed = 60 + Math.random() * 100;
        const size = 4 + Math.random() * 8;
        const life = 0.4 + Math.random() * 0.6;
        const r = Math.random();
        const col = r < 0.4 ? '#ffffff' : (r < 0.75 ? '#ffdd44' : (r < 0.9 ? '#ff8800' : '#ff3300'));
        particles.push({ vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, px: x, py: y, size, life, color: col });
      }
      // 15 fast sparks
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 180 + Math.random() * 140;
        particles.push({ vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, px: x, py: y, size: 2, life: 0.2 + Math.random() * 0.4, color: '#ffffff' });
      }
      explosions.push({ x, y, color: '#ff8800', timer: 0, duration: 3000, particles, large: true });
    }

    function triggerPlayerDeath(px, py) {
      lives--;
      playerHit.active = true;
      playerHit.timer = 0;
      playerHit.x = px + PLAYER_W / 2;
      playerHit.y = py + PLAYER_H / 2;
      spawnPlayerExplosion(playerHit.x, playerHit.y);
    }

    function updatePlayerHit(delta) {
      if (!playerHit.active) return;
      playerHit.timer += delta;
      if (playerHit.timer >= 4500) {
        playerHit.active = false;
      }
    }

    function updateExplosions(delta) {
      const dt = delta / 1000;
      explosions = explosions.filter(e => {
        e.timer += delta;
        e.particles.forEach(p => {
          p.px += p.vx * dt;
          p.py += p.vy * dt;
          p.vy += 60 * dt; // slight gravity
          p.vx *= 0.97;
          p.vy *= 0.97;
        });
        return e.timer < e.duration;
      });
    }

    function renderExplosions() {
      explosions.forEach(e => {
        const t = e.timer / e.duration;

        // Central flash (bright, fades quickly)
        if (t < 0.25) {
          const ft = t / 0.25;
          ctx.globalAlpha = (1 - ft) * 0.9;
          const flashR = 22 * (1 - ft);
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(e.x, e.y, flashR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = e.color;
          ctx.beginPath();
          ctx.arc(e.x, e.y, flashR * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }

        // Particles
        e.particles.forEach(p => {
          const age = t / p.life;
          if (age >= 1) return;
          ctx.globalAlpha = Math.max(0, 1 - age);
          ctx.fillStyle = p.color;
          const s = p.size * (1 - age * 0.5);
          ctx.fillRect(Math.round(p.px - s / 2), Math.round(p.py - s / 2), Math.ceil(s), Math.ceil(s));
        });

        // Ring shockwave
        if (t < 0.4) {
          const rt = t / 0.4;
          ctx.globalAlpha = (1 - rt) * 0.6;
          ctx.strokeStyle = e.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(e.x, e.y, rt * 32, 0, Math.PI * 2);
          ctx.stroke();
        }

        // Extra rings for large (player) explosions
        if (e.large && t < 0.5) {
          const rt2 = Math.max(0, (t - 0.05) / 0.45);
          if (rt2 > 0) {
            ctx.globalAlpha = (1 - rt2) * 0.55;
            ctx.strokeStyle = '#ffdd44';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(e.x, e.y, rt2 * 70, 0, Math.PI * 2);
            ctx.stroke();
          }
          const rt3 = Math.max(0, (t - 0.10) / 0.45);
          if (rt3 > 0) {
            ctx.globalAlpha = (1 - rt3) * 0.45;
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(e.x, e.y, rt3 * 110, 0, Math.PI * 2);
            ctx.stroke();
          }
          const rt4 = Math.max(0, (t - 0.15) / 0.45);
          if (rt4 > 0) {
            ctx.globalAlpha = (1 - rt4) * 0.3;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(e.x, e.y, rt4 * 150, 0, Math.PI * 2);
            ctx.stroke();
          }
        }

        ctx.globalAlpha = 1;
      });
    }

    function renderPlayerHit() {
      if (!playerHit.active) return;
      const t = playerHit.timer;

      // Screen flash: full-white overlay, fades 0–100ms
      if (t < 100) {
        ctx.globalAlpha = (1 - t / 100) * 0.75;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
      }

      // Lives message: blinks 500–2000ms
      if (t >= 500 && t < 2000) {
        const blinkCycle = Math.floor((t - 500) / 200);
        if (blinkCycle % 2 === 0) {
          const text = lives >= 2 ? '2 LIVES REMAINING' : '1 LIFE REMAINING';
          ctx.font = 'bold 72px "Share Tech Mono", "Courier New", monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 35;
          ctx.fillStyle = '#ffffff';
          ctx.fillText(text, W / 2, H / 2);
          ctx.shadowBlur = 12;
          ctx.fillText(text, W / 2, H / 2);
          ctx.shadowBlur = 0;
        }
      }
    }

    // ─── Enemy Bombs ──────────────────────────────────────────────────────────
    let bombs = [];
    let bombTimer = 0;
    const BOMB_INTERVAL = 1600;
    const BOMB_SPEED    = 175;

    function spawnBomb() {
      const alive = enemies.filter(e => e.alive && !e.diving);
      if (alive.length === 0) return;
      const shooter = alive[Math.floor(Math.random() * alive.length)];
      const bx = (shooter.diving ? shooter.x : shooter.x + gridX) + ENEMY_W / 2;
      const by = (shooter.diving ? shooter.y : shooter.y + gridY) + ENEMY_H;
      bombs.push({ x: bx, y: by, frame: 0, frameTimer: 0 });
    }

    function updateBombs(delta) {
      if (gamePhase !== 'playing') return;

      bombTimer += delta;
      if (bombTimer >= BOMB_INTERVAL) {
        bombTimer = 0;
        spawnBomb();
      }

      bombs = bombs.filter(b => {
        b.y += BOMB_SPEED * (delta / 1000);
        b.frameTimer += delta;
        if (b.frameTimer > 140) { b.frame = 1 - b.frame; b.frameTimer = 0; }

        // Damage barriers
        barriers.forEach(bar => {
          bar.blocks.forEach(bl => {
            if (bl.hp <= 0) return;
            const bkx = bar.x + bl.c * 10;
            const bky = bar.y + bl.r * 8;
            if (b.x >= bkx && b.x <= bkx + 9 && b.y >= bky && b.y <= bky + 7) {
              bl.hp--;
            }
          });
        });

        return b.y < H + 20;
      });
    }

    function renderBombs() {
      bombs.forEach(b => {
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 8;
        // Zigzag energy bolt
        ctx.strokeStyle = '#ff6644';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        const bx = Math.round(b.x), by = Math.round(b.y);
        for (let i = 0; i < 4; i++) {
          const offset = (i % 2 === b.frame) ? -3 : 3;
          const py = by + i * 5 - 10;
          if (i === 0) ctx.moveTo(bx + offset, py);
          else ctx.lineTo(bx + offset, py);
        }
        ctx.stroke();
        // Bright tip
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(bx, by + 8, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    // ─── Diving Enemies ───────────────────────────────────────────────────────
    let diveTimer = 0;
    const DIVE_INTERVAL = 4800;
    const DIVE_SPEED    = 180;

    function spawnDiver() {
      const alive = enemies.filter(e => e.alive && !e.diving);
      if (alive.length < 4) return;
      const diver = alive[Math.floor(Math.random() * alive.length)];
      diver.diving = true;
      diver.diveProgress = 0;
      diver.diveStartX = diver.x + gridX;
      diver.diveStartY = diver.y + gridY;
      const missOffset = (Math.random() > 0.5 ? 1 : -1) * (62 + Math.random() * 38);
      diver.diveTargetX = player.x + PLAYER_W / 2 + missOffset;
      diver.diveTargetY = player.y + 8;
      diver.diveReturnX = diver.diveTargetX + missOffset * 0.8;
      diver.diveReturnY = H + 70;
    }

    function updateDivers(delta) {
      if (gamePhase !== 'playing') return;

      diveTimer += delta;
      if (diveTimer >= DIVE_INTERVAL) {
        diveTimer = 0;
        spawnDiver();
      }

      enemies.forEach(e => {
        if (!e.alive || !e.diving) return;

        e.diveProgress += DIVE_SPEED * (delta / 1000);

        const phase1Dist = Math.sqrt(
          Math.pow(e.diveTargetX - e.diveStartX, 2) +
          Math.pow(e.diveTargetY - e.diveStartY, 2)
        );

        if (e.diveProgress < phase1Dist) {
          const t = e.diveProgress / phase1Dist;
          // Swirl: ease-in vertical drop with sinusoidal horizontal oscillation
          const ease = t * t;
          const swirlAmp = 55 * Math.sin(t * Math.PI); // amplitude peaks mid-dive
          const swirlDir = (e.diveTargetX > e.diveStartX) ? 1 : -1;
          const baseX = e.diveStartX + (e.diveTargetX - e.diveStartX) * ease;
          const baseY = e.diveStartY + (e.diveTargetY - e.diveStartY) * ease;
          // Add looping swirl: 2 full sine cycles perpendicular to travel direction
          e.x = baseX + swirlDir * swirlAmp * Math.sin(t * Math.PI * 4);
          e.y = baseY;
        } else {
          const p2 = e.diveProgress - phase1Dist;
          const phase2Dist = Math.sqrt(
            Math.pow(e.diveReturnX - e.diveTargetX, 2) +
            Math.pow(e.diveReturnY - e.diveTargetY, 2)
          );
          const t2 = Math.min(1, p2 / Math.max(1, phase2Dist));
          e.x = e.diveTargetX + (e.diveReturnX - e.diveTargetX) * t2;
          e.y = e.diveTargetY + (e.diveReturnY - e.diveTargetY) * t2;
          if (t2 >= 1) {
            e.alive = false;
            e.diving = false;
          }
        }
      });
    }

    // ─── UFO Mystery Ship ─────────────────────────────────────────────────────
    let ufo = null;
    let ufoTimer = 0;
    const UFO_INTERVAL = 14000;
    let ufoBombs = [];
    const UFO_BOMB_INTERVAL = 2200;
    const UFO_BOMB_SPEED = 160;

    function updateUFO(delta) {
      if (gamePhase !== 'playing') return;
      ufoTimer += delta;
      if (!ufo && ufoTimer > UFO_INTERVAL) {
        ufoTimer = 0;
        ufo = { x: -60, y: 28, speed: 145, bombTimer: UFO_BOMB_INTERVAL };
      }
      if (ufo) {
        ufo.x += ufo.speed * (delta / 1000);
        ufo.bombTimer -= delta;
        if (ufo.bombTimer <= 0) {
          ufo.bombTimer = UFO_BOMB_INTERVAL;
          ufoBombs.push({ x: ufo.x + 22, y: ufo.y + 18 });
        }
        if (ufo.x > W + 70) ufo = null;
      }

      ufoBombs = ufoBombs.filter(b => {
        b.y += UFO_BOMB_SPEED * (delta / 1000);
        // Damage barriers
        barriers.forEach(bar => {
          bar.blocks.forEach(bl => {
            if (bl.hp <= 0) return;
            const bkx = bar.x + bl.c * 10;
            const bky = bar.y + bl.r * 8;
            if (b.x >= bkx && b.x <= bkx + 9 && b.y >= bky && b.y <= bky + 7) {
              bl.hp--;
            }
          });
        });
        return b.y < H + 20;
      });
    }

    function renderUFOBombs() {
      ufoBombs.forEach(b => {
        ctx.shadowColor = '#ff44ff';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = '#ff88ff';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        const bx = Math.round(b.x), by = Math.round(b.y);
        for (let i = 0; i < 4; i++) {
          const offset = (i % 2 === 0) ? -3 : 3;
          const py = by + i * 5 - 10;
          if (i === 0) ctx.moveTo(bx + offset, py);
          else ctx.lineTo(bx + offset, py);
        }
        ctx.stroke();
        ctx.fillStyle = '#ffaaff';
        ctx.beginPath();
        ctx.arc(bx, by + 8, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function renderUFO() {
      if (!ufo) return;
      const ux = ufo.x + 22, uy = ufo.y + 10;

      // Outer glow
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 16;

      // Saucer body with metallic gradient
      const bodyGrad = ctx.createRadialGradient(ux, uy - 2, 4, ux, uy, 22);
      bodyGrad.addColorStop(0, '#ff6666');
      bodyGrad.addColorStop(0.5, '#cc2222');
      bodyGrad.addColorStop(1, '#661111');
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.ellipse(ux, uy, 22, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      // Dome with glass gradient
      ctx.shadowBlur = 8;
      const domeGrad = ctx.createRadialGradient(ux - 2, uy - 5, 1, ux, uy - 2, 11);
      domeGrad.addColorStop(0, '#ffaaaa');
      domeGrad.addColorStop(0.4, '#ee4444');
      domeGrad.addColorStop(1, '#881111');
      ctx.fillStyle = domeGrad;
      ctx.beginPath();
      ctx.ellipse(ux, uy - 3, 11, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      // Dome highlight
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(ux - 3, uy - 7, 4, 2.5, -0.4, 0, Math.PI * 2);
      ctx.fill();

      // Windows — glowing circles
      for (let i = 0; i < 3; i++) {
        const wx = ufo.x + 12 + i * 10;
        ctx.shadowColor = '#ffeeaa';
        ctx.shadowBlur = 6;
        const wGrad = ctx.createRadialGradient(wx, uy, 0.5, wx, uy, 3);
        wGrad.addColorStop(0, '#ffffff');
        wGrad.addColorStop(0.5, '#ffeeaa');
        wGrad.addColorStop(1, '#cc8844');
        ctx.fillStyle = wGrad;
        ctx.beginPath();
        ctx.arc(wx, uy, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Bottom rim highlight
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,150,150,0.4)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(ux, uy + 2, 20, 7, 0, 0.1, Math.PI - 0.1);
      ctx.stroke();

      ctx.shadowBlur = 0;
    }

    // --- Game Phase & GAME OVER ---
    let gamePhase = 'playing';
    let gameOverTimer = 0;

    // --- Player Hit / Lives System ---
    let lives = 3;

    let playerHit = {
      active: false,
      timer: 0,
      x: 0,
      y: 0
    };

    let scheduledHits = [];

    function scheduleHits() {
      const hit1Time = (25 + Math.random() * 45) * 1000; // 25–70s
      const minHit2 = Math.max(90000, hit1Time + 40000);
      const hit2Time = minHit2 + Math.random() * (150000 - minHit2); // 90–150s
      const types = Math.random() < 0.5 ? ['bomb', 'diver'] : ['diver', 'bomb'];
      scheduledHits = [
        { time: hit1Time, type: types[0], triggered: false },
        { time: hit2Time, type: types[1], triggered: false }
      ];
    }
    scheduleHits();

    function checkPhase(delta) {
      const aliveEnemies = enemies.filter(e => e.alive);
      const aliveCount = aliveEnemies.length;
      if (gamePhase === 'playing' && aliveCount === 0) {
        gamePhase = 'gameover';
        gameOverTimer = 0;
        bullets = [];
        bombs = [];
      }
      if (gamePhase === 'gameover') {
        gameOverTimer += delta;
        ufoBombs = [];
      }
    }

    function renderGameOver() {
      if (gamePhase !== 'gameover') return;

      ctx.fillStyle = 'rgba(0,0,0,0.80)';
      ctx.fillRect(0, 0, W, H);

      // Blink: visible 650ms, hidden 150ms out of 800ms cycle
      const t = gameOverTimer % 800;
      if (t > 150) {
        ctx.font = 'bold 120px "Share Tech Mono", "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Glow effect
        ctx.shadowColor = '#00ff00';
        ctx.shadowBlur = 40;
        ctx.fillStyle = COLOR_GAMEOVER;
        ctx.fillText('GAME OVER', W / 2, H / 2);

        // Sharper overlay
        ctx.shadowBlur = 14;
        ctx.fillText('GAME OVER', W / 2, H / 2);

        // Subtitle
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 10;
        ctx.font = '34px "Share Tech Mono", "Courier New", monospace';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('ALL INVADERS DESTROYED', W / 2, H / 2 + 95);

        // Score
        ctx.shadowColor = '#00ff00';
        ctx.shadowBlur = 8;
        const score = TOTAL_ENEMIES * 10;
        ctx.font = '28px "Share Tech Mono", "Courier New", monospace';
        ctx.fillStyle = COLOR_GAMEOVER;
        ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 145);

        ctx.shadowBlur = 0;
      }
    }

    // --- HUD ---
    function renderHUD(elapsed) {
      const aliveEnemies = enemies.filter(e => e.alive);
      const destroyed = TOTAL_ENEMIES - aliveEnemies.length;

      const timeLeft = Math.max(0, TOTAL_DURATION - elapsed);
      const formattedTime = formatTime(timeLeft);

      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 4;
      ctx.fillStyle = '#ff6644';
      ctx.font = 'bold 24px "Share Tech Mono", "Courier New", monospace';

      // Left: Score
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('SCORE: ' + (destroyed * 10), 18, 8);

      // Center: Countdown
      ctx.textAlign = 'center';
      ctx.fillText(formattedTime, W / 2, 8);

      if (gamePhase !== 'gameover') {
        // Right: Invaders count
        ctx.textAlign = 'right';
        ctx.fillText('INVADERS: ' + aliveEnemies.length, W - 18, 8);

        // Bottom Left: Lives
        ctx.textAlign = 'left';
        ctx.fillText('LIVES: ' + lives, 18, H - 26);
      }
      ctx.shadowBlur = 0;
    }

    // --- Subtle scanlines (lighter for hi-res look) ---
    function renderScanlines() {
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      for (let y = 0; y < H; y += 3) {
        ctx.fillRect(0, y, W, 1);
      }
    }

    // ─── GROUND Line ───
    function renderGround() {
      if (gamePhase === 'gameover') return;
      const grad = ctx.createLinearGradient(0, H - 37, 0, H - 34);
      grad.addColorStop(0, '#00cc44');
      grad.addColorStop(1, '#005522');
      ctx.fillStyle = grad;
      ctx.fillRect(0, H - 36, W, 2);
      // Subtle glow
      ctx.fillStyle = 'rgba(0,170,0,0.15)';
      ctx.fillRect(0, H - 38, W, 6);
    }

    // ─── Game Loop ────────────────────────────────────────────────────────────
    let lastTime = 0;
    let startTime = null;

    function update(delta, elapsed) {
      // Check scheduled hits
      if (gamePhase === 'playing') {
        scheduledHits.forEach(hit => {
          if (!hit.triggered && elapsed >= hit.time && !playerHit.active) {
            hit.triggered = true;
            if (hit.type === 'bomb') spawnScriptedBomb();
            else spawnScriptedDiver();
          }
        });
      }
      updatePlayerHit(delta);

      if (gamePhase === 'playing') {
        updateEnemies(delta);
        updatePlayer(delta, elapsed);
        updateBullets(delta, elapsed);
        updateBombs(delta);
        updateDivers(delta);
        updateUFO(delta);
        updateExplosions(delta);
      } else {
        updateExplosions(delta);
      }
      checkPhase(delta);
    }

    function render(elapsed) {
      if (isNaN(elapsed) || !ctx) return;
      // Background
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, W, H);

      renderGround();
      renderBarriers();
      renderEnemies();
      renderUFO();
      renderUFOBombs();
      renderBombs();
      renderBullets();
      renderExplosions();
      renderPlayerHit();
      renderPlayer();
      renderHUD(elapsed);
      renderScanlines();
      renderGameOver();
    }

    function gameLoop(timestamp) {
      try {
        if (!startTime) {
          startTime = timestamp;
        }
        const elapsed = timestamp - startTime;
        const delta = Math.min(timestamp - lastTime, 50); // cap at 50ms to avoid spiral
        lastTime = timestamp;

        update(delta, elapsed);
        render(elapsed);

        if (elapsed < TOTAL_DURATION + GAME_OVER_DURATION) {
          requestAnimationFrame(gameLoop);
        }
      } catch (e) {
        console.error("CRITICAL ERROR in gameLoop: ", e);
      }
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
