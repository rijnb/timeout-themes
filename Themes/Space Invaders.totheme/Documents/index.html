<!DOCTYPE html>
<html lang="">
<head>
  <meta charset="utf-8">
  <title>Space Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      width: 100vw;
      height: 100vh;
    }
    #game-container {
      width: 60vw;
      height: 60vh;
      margin-top: 50px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
  </div>
  <script>
    // --- Canvas & Constants ---
    const canvas = document.getElementById('game');
    const ctx = canvas ? canvas.getContext('2d') : null;

    const W = 800, H = 600;
    canvas.width = W;
    canvas.height = H;

    const TOTAL_DURATION      = 180000; // 3 minutes in ms
    const GAME_OVER_DURATION   =  10000; // 10 seconds
    const SHOOT_DEADLINE       = 165000; // all enemies must be shot by 2m45s
    const ENEMY_COLS = 10, ENEMY_ROWS = 6;
    const TOTAL_ENEMIES = ENEMY_COLS * ENEMY_ROWS; // 60

    // --- Precise Timing Milestones ---
    const destructionMilestones = [];

    function generateMilestones() {
      const deadline = SHOOT_DEADLINE;
      const total = TOTAL_ENEMIES;

      let currentTime = 0;
      let remainingTime = deadline;
      let remainingEnemies = total;

      for (let i = 0; i < total - 1; i++) {
        const avg = remainingTime / remainingEnemies;
        // Jitter between 0.5 and 1.5 of average
        const interval = avg * (0.5 + Math.random());

        currentTime += interval;
        destructionMilestones.push(currentTime);

        remainingTime -= interval;
        remainingEnemies--;

        // Safety: don't let currentTime exceed deadline before the last one
        if (currentTime > deadline - 500) {
           currentTime = deadline - 500;
        }
      }

      // The 60th enemy is hit exactly at 165,000ms
      destructionMilestones.push(deadline);
      destructionMilestones.sort((a, b) => a - b);
    }
    generateMilestones();

    const COLOR_BG        = '#000000';
    // Per-row colors (7 rows, top to bottom)
    const ROW_COLORS = [
      '#ff4444', // row 0 — red
      '#ff9900', // row 1 — orange
      '#ffff00', // row 2 — yellow
      '#00ff88', // row 3 — mint
      '#00ffff', // row 4 — cyan
      '#4488ff', // row 5 — blue
      '#cc44ff'  // row 6 — purple
    ];
    const COLOR_ENEMY_A   = ROW_COLORS[0];
    const COLOR_PLAYER    = '#ffffff';
    const COLOR_BULLET    = '#ffffff';
    const COLOR_BOMB      = '#ff4444';
    const COLOR_EXPLOSION = '#ffff00';
    const COLOR_GAMEOVER  = '#00ff00';
    const COLOR_UFO       = '#ff2222';
    const COLOR_BARRIER   = '#00aa00';

    // ─── Sprite Data ─────────────────────────────────────────────────────────
    // Each sprite: array of 8 rows, each row is an 11-char binary string
    const SPRITES = {
      A: [ // crab — top row
        ['00100000100','00010001000','00111111100','01101110110',
         '11111111111','10111111101','10100000101','01011011010'],
        ['00100000100','10010001001','10111111101','11101110111',
         '11111111111','01111111110','00100000100','01000000010']
      ],
      B: [ // squid — middle rows
        ['00010000100','00001001000','00011111100','01110110111',
         '11111111111','10111111101','10000000001','01100110011'],
        ['00010000100','10001001001','10011111101','01110110111',
         '11111111111','01111111110','01000000010','10100110101']
      ],
      C: [ // octopus — bottom rows
        ['00111111100','11111111111','11101010111','11111111111',
         '00101010100','01000000010','10100000101','01000000010'],
        ['00111111100','11111111111','11101010111','11111111111',
         '00101010100','01011011010','10100000101','00011011000']
      ]
    };

    const PLAYER_SPRITE = [
      '00000100000',
      '00001110000',
      '00001110000',
      '11111111111',
      '11111111111',
      '11111111111'
    ];

    function spriteType(row) {
      if (row === 0) return 'A';
      if (row <= 2)  return 'B';
      return 'C';
    }

    function spriteColor(type, row) {
      return ROW_COLORS[Math.min(row, ROW_COLORS.length - 1)];
    }

    function formatTime(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
    }

    // ─── Enemy Grid ───────────────────────────────────────────────────────────
    const ENEMY_W = 40, ENEMY_H = 28, ENEMY_PAD_X = 20, ENEMY_PAD_Y = 12;
    const GRID_OFFSET_X = 60, GRID_OFFSET_Y = 55;

    let enemies = [];
    for (let r = 0; r < ENEMY_ROWS; r++) {
      for (let c = 0; c < ENEMY_COLS; c++) {
        enemies.push({
          row: r, col: c,
          x: GRID_OFFSET_X + c * (ENEMY_W + ENEMY_PAD_X),
          y: GRID_OFFSET_Y + r * (ENEMY_H + ENEMY_PAD_Y),
          alive: true,
          type: spriteType(r),
          diving: false,
          diveProgress: 0,
          diveStartX: 0, diveStartY: 0,
          diveTargetX: 0, diveTargetY: 0,
          diveReturnX: 0, diveReturnY: 0
        });
      }
    }

    let gridDir = 1;
    let gridX = 0, gridY = 0;
    let gridTargetY = 0;          // smooth Y drop target
    let gridSpeed = 38; // px/s
    let gridVelocity = 0; // px/s, updated each frame (positive = right)
    let gridTargetVelocity = 0;   // desired velocity — gridVelocity lerps toward this
    let bounceCount = 0;   // total wall bounces so far
    const DROP_EVERY = 3;  // drop only every Nth bounce
    let spriteFrameTimer = 0;
    let spriteFrame = 0;

    function updateEnemies(delta) {
      spriteFrameTimer += delta;
      if (spriteFrameTimer > 500) {
        spriteFrame = 1 - spriteFrame;
        spriteFrameTimer = 0;
      }

      const alive = enemies.filter(e => e.alive && !e.diving);
      if (alive.length === 0) return;

      const minX = Math.min(...alive.map(e => e.x + gridX));
      const maxX = Math.max(...alive.map(e => e.x + gridX + ENEMY_W));

      if (gridDir === 1 && maxX >= W - 18) {
        gridDir = -1;
        bounceCount++;
        if (bounceCount % DROP_EVERY === 0) {
          const barrierTop = barriers.length > 0 ? barriers[0].y : H - 120;
          const bottomEnemyY = Math.max(...alive.map(e => e.y + gridTargetY + ENEMY_H));
          if (bottomEnemyY + 18 < barrierTop) {
            gridTargetY += 18;
          }
        }
      } else if (gridDir === -1 && minX <= 18) {
        gridDir = 1;
        bounceCount++;
        if (bounceCount % DROP_EVERY === 0) {
          const barrierTop = barriers.length > 0 ? barriers[0].y : H - 120;
          const bottomEnemyY = Math.max(...alive.map(e => e.y + gridTargetY + ENEMY_H));
          if (bottomEnemyY + 18 < barrierTop) {
            gridTargetY += 18;
          }
        }
      }

      // Speed up slightly as enemies are destroyed
      const ratio = alive.length / TOTAL_ENEMIES;
      const speed = gridSpeed * (1 + (1 - ratio) * 0.8);
      gridTargetVelocity = gridDir * speed;

      // Ease-in-out: smoothly lerp velocity toward target (soft direction changes)
      const lerpFactor = Math.min(1, delta / 300);
      gridVelocity += (gridTargetVelocity - gridVelocity) * lerpFactor;
      gridX += gridVelocity * (delta / 1000);

      // Smooth Y drops (ease toward target Y)
      const dy = gridTargetY - gridY;
      if (Math.abs(dy) > 0.5) {
        gridY += dy * Math.min(1, delta / 250);
      } else {
        gridY = gridTargetY;
      }
    }

    function drawSprite(x, y, type, frame, color) {
      const rows = SPRITES[type][frame];
      const pw = ENEMY_W / 11;
      const ph = ENEMY_H / 8;
      ctx.fillStyle = color;
      rows.forEach((row, ry) => {
        for (let cx = 0; cx < row.length; cx++) {
          if (row[cx] === '1') {
            ctx.fillRect(
              Math.round(x + cx * pw),
              Math.round(y + ry * ph),
              Math.ceil(pw), Math.ceil(ph)
            );
          }
        }
      });
    }

    function renderEnemies() {
      // Draw non-diving enemies first, then diving enemies on top
      enemies.forEach(e => {
        if (!e.alive || e.diving) return;
        drawSprite(e.x + gridX, e.y + gridY, e.type, spriteFrame, spriteColor(e.type, e.row));
      });
      enemies.forEach(e => {
        if (!e.alive || !e.diving) return;
        drawSprite(e.x, e.y, e.type, spriteFrame, spriteColor(e.type, e.row));
      });
    }

    // ─── Player ───────────────────────────────────────────────────────────────
    const PLAYER_W = 44, PLAYER_H = 24;
    let player = {
      x: W / 2 - PLAYER_W / 2,
      y: H - 58,
      speed: 130,
      targetX: W / 2 - PLAYER_W / 2
    };

    let driftTimer = 0;
    let moveCommitTimer = 0;       // cooldown before accepting a new target
    const MOVE_COMMIT_TIME = 800;  // ms — commit to current direction before changing
    const MOVE_DEAD_ZONE = 60;     // px — ignore target changes smaller than this
    let playerVelocity = 0;        // current smoothed velocity

    function evadeToSafeX(threatX) {
      // Threats always override the commit timer and smoothing
      moveCommitTimer = 0;
      const clearance = 120; // move well clear of the threat
      if (threatX < W / 2) {
        player.targetX = Math.min(W - PLAYER_W - 30, threatX + clearance);
      } else {
        player.targetX = Math.max(30, threatX - clearance);
      }
    }

    // Returns the predicted X of a threat at the moment it reaches the player's Y.
    // Returns null if the threat won't reach the player or is already past.
    function predictedImpactX(threatX, threatY, threatVX, threatVY) {
      if (threatVY <= 0) return null; // moving up or stationary — no threat
      const timeToPlayer = (player.y - threatY) / threatVY;
      if (timeToPlayer < 0 || timeToPlayer > 3) return null; // already past or too far
      return threatX + threatVX * timeToPlayer;
    }

    function updatePlayer(delta, elapsed) {
      const playerCX = player.x + PLAYER_W / 2;
      let threatened = false;
      const EVASION_ZONE = ENEMY_W * 2 + PLAYER_W; // wide detection zone for divers

      // --- Threat 1 (HIGHEST PRIORITY): diving enemies ---
      // Check ALL diving enemies, even far away, and evade the closest one
      let closestDiverDist = Infinity;
      let closestDiverImpactX = null;
      enemies.forEach(e => {
        if (!e.alive || !e.diving) return;
        const diverCX = e.x + ENEMY_W / 2;
        const dx = e.diveTargetX - e.x;
        const dy = e.diveTargetY - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const vx = (dx / dist) * DIVE_SPEED;
        const vy = (dy / dist) * DIVE_SPEED;
        const impactX = predictedImpactX(diverCX, e.y, vx, vy);
        if (impactX !== null && Math.abs(impactX - playerCX) < EVASION_ZONE) {
          const diverDist = Math.abs(e.y - player.y);
          if (diverDist < closestDiverDist) {
            closestDiverDist = diverDist;
            closestDiverImpactX = impactX;
          }
          threatened = true;
        }
      });
      if (closestDiverImpactX !== null) {
        evadeToSafeX(closestDiverImpactX);
        // Override speed — move fast when evading divers
        player.speed = 300;
        // Force immediate velocity toward evasion target
        const evadeDx = player.targetX - player.x;
        playerVelocity = Math.sign(evadeDx) * player.speed;
      }

      // --- Threat 2: falling bombs ---
      if (!threatened) {
        bombs.forEach(b => {
          const impactX = predictedImpactX(b.x, b.y, 0, BOMB_SPEED);
          if (impactX !== null && Math.abs(impactX - playerCX) < PLAYER_W + 20) {
            evadeToSafeX(impactX);
            threatened = true;
          }
        });
      }

      // --- Threat 3: UFO bombs ---
      if (!threatened) {
        ufoBombs.forEach(b => {
          const impactX = predictedImpactX(b.x, b.y, 0, UFO_BOMB_SPEED);
          if (impactX !== null && Math.abs(impactX - playerCX) < PLAYER_W + 20) {
            evadeToSafeX(impactX);
            threatened = true;
          }
        });
      }

      if (!threatened) {
        moveCommitTimer = Math.max(0, moveCommitTimer - delta);

        const target = getNextTarget();
        const aliveEnemies = enemies.filter(e => e.alive);
        const milestoneIdx = TOTAL_ENEMIES - aliveEnemies.length;
        const targetMilestone = destructionMilestones[milestoneIdx] || SHOOT_DEADLINE;

        if (target) {
          const ex = target.diving ? target.x : target.x + gridX;
          const ey = target.diving ? target.y : target.y + gridY;
          // Predict where the enemy will be when the bullet arrives
          const travelTime = (player.y - ey) / BULLET_SPEED;
          const futureX = ex + (target.diving ? 0 : gridVelocity * travelTime) + ENEMY_W / 2;

          const candidateX = futureX - PLAYER_W / 2;
          const shift = Math.abs(candidateX - player.targetX);

          // Only change target if commit timer expired AND the change is significant
          if (moveCommitTimer <= 0 && shift > MOVE_DEAD_ZONE) {
            player.targetX = candidateX;
            moveCommitTimer = MOVE_COMMIT_TIME;
          }

          // If we are getting close to fireTime, move faster!
          const fireTime = targetMilestone - travelTime;
          const timeToFire = fireTime - elapsed;

          // Performance boost if we are behind
          player.speed = 130 + Math.max(0, (165000 - targetMilestone) / 1000);
          if (timeToFire < 500) player.speed += 50;
        } else {
          driftTimer += delta;
          if (driftTimer > 2200) {
            driftTimer = 0;
            player.targetX = 70 + Math.random() * (W - PLAYER_W - 140);
            moveCommitTimer = MOVE_COMMIT_TIME;
          }
        }
      }

      const dx = player.targetX - player.x;
      if (Math.abs(dx) > MOVE_DEAD_ZONE) {
        // Ease-in: gently accelerate toward desired direction
        // Scale speed down when close to target for ease-out approach
        const distRatio = Math.min(Math.abs(dx) / 150, 1); // 0..1
        const easedSpeed = player.speed * (0.3 + 0.7 * distRatio); // slow near target
        const desiredV = Math.sign(dx) * easedSpeed;
        playerVelocity += (desiredV - playerVelocity) * Math.min(1, delta / 350);
        player.x += playerVelocity * (delta / 1000);
      } else {
        // Ease-out: smoothly decelerate to stop
        playerVelocity *= Math.max(0, 1 - delta / 250);
        if (Math.abs(playerVelocity) < 3) {
          playerVelocity = 0;
          player.x = player.targetX;
        } else {
          player.x += playerVelocity * (delta / 1000);
        }
      }
      player.x = Math.max(10, Math.min(W - PLAYER_W - 10, player.x));
    }

    function renderPlayer() {
      if (gamePhase === 'gameover') return;
      const pw = PLAYER_W / 11;
      const ph = PLAYER_H / 6;

      // Color based on recharge state
      ctx.fillStyle = (rechargeTimer > 0) ? '#4488ff' : COLOR_PLAYER;

      PLAYER_SPRITE.forEach((row, ry) => {
        for (let cx = 0; cx < row.length; cx++) {
          if (row[cx] === '1') {
            ctx.fillRect(
              Math.round(player.x + cx * pw),
              Math.round(player.y + ry * ph),
              Math.ceil(pw), Math.ceil(ph)
            );
          }
        }
      });

      // Small recharging bar
      if (rechargeTimer > 0) {
        const barW = (rechargeTimer / RECHARGE_DELAY) * PLAYER_W;
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(player.x, player.y + PLAYER_H + 5, barW, 3);
      }
    }

    // ─── Barriers ─────────────────────────────────────────────────────────────
    // 4 classic bunkers
    const BARRIER_COLS = 4;
    const barriers = [];
    for (let i = 0; i < BARRIER_COLS; i++) {
      const bx = 80 + i * ((W - 160) / (BARRIER_COLS - 1)) - 20;
      const by = H - 120;
      // Each barrier is a 4x3 block grid (each block 10x8)
      const blocks = [];
      for (let r = 0; r < 3; r++) {
        for (let c = 0; c < 4; c++) {
          // Classic arch shape: skip bottom-left and bottom-right corners
          if (r === 2 && (c === 1 || c === 2)) continue;
          blocks.push({ r, c, hp: 3 });
        }
      }
      barriers.push({ x: bx, y: by, blocks });
    }

    function renderBarriers() {
      barriers.forEach(bar => {
        bar.blocks.forEach(bl => {
          ctx.globalAlpha = bl.hp / 3;
          ctx.fillStyle = COLOR_BARRIER;
          ctx.fillRect(bar.x + bl.c * 10, bar.y + bl.r * 8, 9, 7);
        });
      });
      ctx.globalAlpha = 1;
    }

    // ─── Player Bullets ──────────────────────────────────────────────────────
    let bullets = [];
    let nextEnemyIndex = 0;
    let burstRemaining = 0;
    let burstTimer = 0;
    let rechargeTimer = 0;
    let currentShotIsBurst = false;
    const BURST_SHOT_DELAY  = 200;  // ms between shots in a burst
    const RECHARGE_DELAY    = 3000; // ms recharge after a burst
    const NORMAL_SHOT_DELAY = 800;  // ms recharge after a normal single shot

    function getNextTarget() {
      // Find enemies that are alive and not already targeted by an active bullet
      const targetedEnemies = bullets.map(b => b.targetEnemy);
      const alive = enemies.filter(e => e.alive && !e.diving && !targetedEnemies.includes(e));
      if (alive.length === 0) return null;

      // Urgency: if any enemy's bottom edge is at or below the barrier top, shoot those first
      const barrierTop = barriers.length > 0 ? barriers[0].y : H - 120;
      const urgent = alive.filter(e => (e.y + gridY + ENEMY_H) >= barrierTop);
      const pool = urgent.length > 0 ? urgent : alive;

      // Within the pool: bottom-to-top, left-to-right
      pool.sort((a, b) => (b.row - a.row) || (a.col - b.col));
      return pool[0];
    }

    const BULLET_SPEED = 420;

    function updateBullets(delta, elapsed) {
      if (gamePhase !== 'playing') return;

      const aliveEnemies = enemies.filter(e => e.alive);
      const enemiesAliveCount = aliveEnemies.length;
      if (enemiesAliveCount === 0) return;

      // Handle timers
      if (rechargeTimer > 0) {
        rechargeTimer -= delta;
      }
      if (burstTimer > 0) {
        burstTimer -= delta;
      }

      const milestoneIdx = TOTAL_ENEMIES - enemiesAliveCount;
      if (milestoneIdx >= TOTAL_ENEMIES) return;

      const targetMilestone = destructionMilestones[milestoneIdx];
      if (targetMilestone === undefined) return;
      const target = getNextTarget();

      if (target && rechargeTimer <= 0 && burstTimer <= 0) {
        // Start a new burst if we are ready and not currently in one
        if (burstRemaining <= 0) {
          // 80% chance: single shot (normal fire); 20% chance: burst of 3-5
          currentShotIsBurst = Math.random() >= 0.8;
          burstRemaining = currentShotIsBurst ? Math.floor(Math.random() * 3) + 3 : 1;
        }

        const ex = target.diving ? target.x : target.x + gridX;
        const ey = target.diving ? target.y : target.y + gridY;

        // Bullet travel time:
        const travelTime = (player.y - ey) / BULLET_SPEED;
        const fireTime = targetMilestone - travelTime;

        // Fire if we reached the required time
        if (elapsed >= fireTime) {
          // Predict future X accounting for bullet travel time
          const futureX = ex + (target.diving ? 0 : gridVelocity * travelTime) + ENEMY_W / 2;
          const px = player.x + PLAYER_W / 2;

          // Only shoot if aligned with predicted future position (within 15px)
          const aligned = Math.abs(futureX - px) < 15;
          const overdue = elapsed > fireTime + 300; // if more than 300ms overdue, just fire

          if (aligned || overdue) {
            // Compute horizontal velocity so the bullet angles toward the target
            const dx = futureX - px;
            const dy = player.y - ey; // vertical distance to target
            const vx = dy > 0 ? (dx / dy) * BULLET_SPEED : 0;

            bullets.push({
              x: px,
              y: player.y,
              vx: vx,
              targetEnemy: target,
              predictedX: futureX
            });

            burstRemaining--;
            if (burstRemaining > 0) {
              burstTimer = BURST_SHOT_DELAY;
            } else {
              rechargeTimer = currentShotIsBurst ? RECHARGE_DELAY : NORMAL_SHOT_DELAY;
            }
          }
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];

        b.y -= BULLET_SPEED * (delta / 1000);
        b.x += (b.vx || 0) * (delta / 1000);

        // Remove bullets that leave the screen
        if (b.y < -20) {
          bullets.splice(i, 1);
          continue;
        }

        // Remove bullets whose assigned target was already killed by another bullet
        if (!b.targetEnemy.alive) {
          bullets.splice(i, 1);
          continue;
        }

        // Check collision against ALL alive enemies, not just the assigned target
        let hit = false;
        for (let j = 0; j < enemies.length; j++) {
          const e = enemies[j];
          if (!e.alive) continue;
          const ex = (e.diving ? e.x : e.x + gridX) + ENEMY_W / 2;
          const ey = (e.diving ? e.y : e.y + gridY) + ENEMY_H / 2;

          if (b.y <= ey + ENEMY_H / 2 && b.y >= ey - ENEMY_H / 2 &&
              Math.abs(b.x - ex) < ENEMY_W / 2 + 4) {
            e.alive = false;
            e.diving = false;
            spawnExplosion(ex, ey, spriteColor(e.type, e.row));
            bullets.splice(i, 1);
            hit = true;

            if (enemies.filter(e => e.alive).length === 0) {
              console.log("FINAL ENEMY DESTROYED AT: " + elapsed + "ms");
            }
            break;
          }
        }
      }
    }

    function renderBullets() {
      ctx.fillStyle = COLOR_BULLET;
      bullets.forEach(b => {
        ctx.fillRect(Math.round(b.x - 2), Math.round(b.y - 10), 4, 18);
      });
    }

    // ─── Explosions ───────────────────────────────────────────────────────────
    let explosions = [];

    function spawnExplosion(x, y, color) {
      const particles = [];
      const count = 22;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
        const speed = 40 + Math.random() * 90;
        const size = 2 + Math.random() * 4;
        const life = 0.5 + Math.random() * 0.5; // fraction of duration
        particles.push({
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          px: x, py: y,
          size,
          life,
          color: Math.random() < 0.4 ? '#ffffff' : (Math.random() < 0.5 ? '#ffff88' : color)
        });
      }
      // Add a few sparks that shoot further
      for (let i = 0; i < 6; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 120 + Math.random() * 80;
        particles.push({
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          px: x, py: y,
          size: 1.5,
          life: 0.6 + Math.random() * 0.4,
          color: '#ffffff'
        });
      }
      explosions.push({ x, y, color: color || COLOR_EXPLOSION, timer: 0, duration: 600, particles });
    }

    function updateExplosions(delta) {
      const dt = delta / 1000;
      explosions = explosions.filter(e => {
        e.timer += delta;
        e.particles.forEach(p => {
          p.px += p.vx * dt;
          p.py += p.vy * dt;
          p.vy += 60 * dt; // slight gravity
          p.vx *= 0.97;
          p.vy *= 0.97;
        });
        return e.timer < e.duration;
      });
    }

    function renderExplosions() {
      explosions.forEach(e => {
        const t = e.timer / e.duration;

        // Central flash (bright, fades quickly)
        if (t < 0.25) {
          const ft = t / 0.25;
          ctx.globalAlpha = (1 - ft) * 0.9;
          const flashR = 22 * (1 - ft);
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(e.x, e.y, flashR, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = e.color;
          ctx.beginPath();
          ctx.arc(e.x, e.y, flashR * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }

        // Particles
        e.particles.forEach(p => {
          const age = t / p.life;
          if (age >= 1) return;
          ctx.globalAlpha = Math.max(0, 1 - age);
          ctx.fillStyle = p.color;
          const s = p.size * (1 - age * 0.5);
          ctx.fillRect(Math.round(p.px - s / 2), Math.round(p.py - s / 2), Math.ceil(s), Math.ceil(s));
        });

        // Ring shockwave
        if (t < 0.4) {
          const rt = t / 0.4;
          ctx.globalAlpha = (1 - rt) * 0.6;
          ctx.strokeStyle = e.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(e.x, e.y, rt * 32, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
      });
    }

    // ─── Enemy Bombs ──────────────────────────────────────────────────────────
    let bombs = [];
    let bombTimer = 0;
    const BOMB_INTERVAL = 1600;
    const BOMB_SPEED    = 175;

    function spawnBomb() {
      const alive = enemies.filter(e => e.alive && !e.diving);
      if (alive.length === 0) return;
      const shooter = alive[Math.floor(Math.random() * alive.length)];
      const bx = (shooter.diving ? shooter.x : shooter.x + gridX) + ENEMY_W / 2;
      const by = (shooter.diving ? shooter.y : shooter.y + gridY) + ENEMY_H;
      bombs.push({ x: bx, y: by, frame: 0, frameTimer: 0 });
    }

    function updateBombs(delta) {
      if (gamePhase !== 'playing') return;

      bombTimer += delta;
      if (bombTimer >= BOMB_INTERVAL) {
        bombTimer = 0;
        spawnBomb();
      }

      bombs = bombs.filter(b => {
        b.y += BOMB_SPEED * (delta / 1000);
        b.frameTimer += delta;
        if (b.frameTimer > 140) { b.frame = 1 - b.frame; b.frameTimer = 0; }

        // Damage barriers
        barriers.forEach(bar => {
          bar.blocks.forEach(bl => {
            if (bl.hp <= 0) return;
            const bkx = bar.x + bl.c * 10;
            const bky = bar.y + bl.r * 8;
            if (b.x >= bkx && b.x <= bkx + 9 && b.y >= bky && b.y <= bky + 7) {
              bl.hp--;
            }
          });
        });

        return b.y < H + 20;
      });
    }

    function renderBombs() {
      ctx.fillStyle = COLOR_BOMB;
      bombs.forEach(b => {
        for (let i = 0; i < 4; i++) {
          const offset = (i % 2 === b.frame) ? -3 : 3;
          ctx.fillRect(Math.round(b.x + offset - 2), Math.round(b.y + i * 5 - 10), 4, 5);
        }
      });
    }

    // ─── Diving Enemies ───────────────────────────────────────────────────────
    let diveTimer = 0;
    const DIVE_INTERVAL = 4800;
    const DIVE_SPEED    = 180;

    function spawnDiver() {
      const alive = enemies.filter(e => e.alive && !e.diving);
      if (alive.length < 4) return;
      const diver = alive[Math.floor(Math.random() * alive.length)];
      diver.diving = true;
      diver.diveProgress = 0;
      diver.diveStartX = diver.x + gridX;
      diver.diveStartY = diver.y + gridY;
      const missOffset = (Math.random() > 0.5 ? 1 : -1) * (62 + Math.random() * 38);
      diver.diveTargetX = player.x + PLAYER_W / 2 + missOffset;
      diver.diveTargetY = player.y + 8;
      diver.diveReturnX = diver.diveTargetX + missOffset * 0.8;
      diver.diveReturnY = H + 70;
    }

    function updateDivers(delta) {
      if (gamePhase !== 'playing') return;

      diveTimer += delta;
      if (diveTimer >= DIVE_INTERVAL) {
        diveTimer = 0;
        spawnDiver();
      }

      enemies.forEach(e => {
        if (!e.alive || !e.diving) return;

        e.diveProgress += DIVE_SPEED * (delta / 1000);

        const phase1Dist = Math.sqrt(
          Math.pow(e.diveTargetX - e.diveStartX, 2) +
          Math.pow(e.diveTargetY - e.diveStartY, 2)
        );

        if (e.diveProgress < phase1Dist) {
          const t = e.diveProgress / phase1Dist;
          // Swirl: ease-in vertical drop with sinusoidal horizontal oscillation
          const ease = t * t;
          const swirlAmp = 55 * Math.sin(t * Math.PI); // amplitude peaks mid-dive
          const swirlDir = (e.diveTargetX > e.diveStartX) ? 1 : -1;
          const baseX = e.diveStartX + (e.diveTargetX - e.diveStartX) * ease;
          const baseY = e.diveStartY + (e.diveTargetY - e.diveStartY) * ease;
          // Add looping swirl: 2 full sine cycles perpendicular to travel direction
          e.x = baseX + swirlDir * swirlAmp * Math.sin(t * Math.PI * 4);
          e.y = baseY;
        } else {
          const p2 = e.diveProgress - phase1Dist;
          const phase2Dist = Math.sqrt(
            Math.pow(e.diveReturnX - e.diveTargetX, 2) +
            Math.pow(e.diveReturnY - e.diveTargetY, 2)
          );
          const t2 = Math.min(1, p2 / Math.max(1, phase2Dist));
          e.x = e.diveTargetX + (e.diveReturnX - e.diveTargetX) * t2;
          e.y = e.diveTargetY + (e.diveReturnY - e.diveTargetY) * t2;
          if (t2 >= 1) {
            e.alive = false;
            e.diving = false;
          }
        }
      });
    }

    // ─── UFO Mystery Ship ─────────────────────────────────────────────────────
    let ufo = null;
    let ufoTimer = 0;
    const UFO_INTERVAL = 14000;
    let ufoBombs = [];
    const UFO_BOMB_INTERVAL = 2200;
    const UFO_BOMB_SPEED = 160;

    function updateUFO(delta) {
      if (gamePhase !== 'playing') return;
      ufoTimer += delta;
      if (!ufo && ufoTimer > UFO_INTERVAL) {
        ufoTimer = 0;
        ufo = { x: -60, y: 28, speed: 145, bombTimer: UFO_BOMB_INTERVAL };
      }
      if (ufo) {
        ufo.x += ufo.speed * (delta / 1000);
        ufo.bombTimer -= delta;
        if (ufo.bombTimer <= 0) {
          ufo.bombTimer = UFO_BOMB_INTERVAL;
          ufoBombs.push({ x: ufo.x + 22, y: ufo.y + 18 });
        }
        if (ufo.x > W + 70) ufo = null;
      }

      ufoBombs = ufoBombs.filter(b => {
        b.y += UFO_BOMB_SPEED * (delta / 1000);
        // Damage barriers
        barriers.forEach(bar => {
          bar.blocks.forEach(bl => {
            if (bl.hp <= 0) return;
            const bkx = bar.x + bl.c * 10;
            const bky = bar.y + bl.r * 8;
            if (b.x >= bkx && b.x <= bkx + 9 && b.y >= bky && b.y <= bky + 7) {
              bl.hp--;
            }
          });
        });
        return b.y < H + 20;
      });
    }

    function renderUFOBombs() {
      ctx.fillStyle = '#ff88ff';
      ufoBombs.forEach(b => {
        for (let i = 0; i < 4; i++) {
          const offset = (i % 2 === 0) ? -3 : 3;
          ctx.fillRect(Math.round(b.x + offset - 2), Math.round(b.y + i * 5 - 10), 4, 5);
        }
      });
    }

    function renderUFO() {
      if (!ufo) return;
      ctx.fillStyle = COLOR_UFO;
      // Saucer body
      ctx.beginPath();
      ctx.ellipse(ufo.x + 22, ufo.y + 10, 22, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      // Dome
      ctx.beginPath();
      ctx.ellipse(ufo.x + 22, ufo.y + 5, 11, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      // Windows
      ctx.fillStyle = '#ffaaaa';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(ufo.x + 12 + i * 10, ufo.y + 10, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // --- Game Phase & GAME OVER ---
    let gamePhase = 'playing';
    let gameOverTimer = 0;

    function checkPhase(delta) {
      const aliveEnemies = enemies.filter(e => e.alive);
      const aliveCount = aliveEnemies.length;
      if (gamePhase === 'playing' && aliveCount === 0) {
        gamePhase = 'gameover';
        gameOverTimer = 0;
        bullets = [];
        bombs = [];
      }
      if (gamePhase === 'gameover') {
        gameOverTimer += delta;
        ufoBombs = [];
      }
    }

    function renderGameOver() {
      if (gamePhase !== 'gameover') return;

      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(0, 0, W, H);

      // Blink: visible 650ms, hidden 150ms out of 800ms cycle
      const t = gameOverTimer % 800;
      if (t > 150) {
        // Shadow
        ctx.font = 'bold 80px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#003300';
        ctx.fillText('GAME OVER', W / 2 + 5, H / 2 + 5);
        // Main text
        ctx.fillStyle = COLOR_GAMEOVER;
        ctx.fillText('GAME OVER', W / 2, H / 2);

        // Subtitle
        ctx.font = '22px "Courier New", Courier, monospace';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('ALL INVADERS DESTROYED', W / 2, H / 2 + 72);

        // Score
        const score = TOTAL_ENEMIES * 10;
        ctx.font = '18px "Courier New", Courier, monospace';
        ctx.fillStyle = COLOR_GAMEOVER;
        ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 108);
      }
    }

    // --- HUD ---
    function renderHUD(elapsed) {
      const aliveEnemies = enemies.filter(e => e.alive);
      const destroyed = TOTAL_ENEMIES - aliveEnemies.length;

      const timeLeft = Math.max(0, TOTAL_DURATION - elapsed);
      const formattedTime = formatTime(timeLeft);

      ctx.fillStyle = COLOR_ENEMY_A;
      ctx.font = '15px "Courier New", Courier, monospace';

      // Left: Score
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText('SCORE: ' + (destroyed * 10), 18, 8);

      // Center: Countdown
      ctx.textAlign = 'center';
      ctx.fillText(formattedTime, W / 2, 8);

      if (gamePhase !== 'gameover') {
        // Right: Invaders count
        ctx.textAlign = 'right';
        ctx.fillText('INVADERS: ' + enemies.filter(e => e.alive).length, W - 18, 8);

        // Bottom Left: Lives
        ctx.textAlign = 'left';
        ctx.fillText('LIVES: 3', 18, H - 22);
      }
    }

    // --- Scanlines ---
    function renderScanlines() {
      ctx.fillStyle = 'rgba(0,0,0,0.07)';
      for (let y = 0; y < H; y += 4) {
        ctx.fillRect(0, y, W, 2);
      }
    }

    // ─── GROUND Line ───
    function renderGround() {
      if (gamePhase === 'gameover') return;
      ctx.fillStyle = '#00aa00';
      ctx.fillRect(0, H - 36, W, 2);
    }

    // ─── Game Loop ────────────────────────────────────────────────────────────
    let lastTime = 0;
    let startTime = null;

    function update(delta, elapsed) {
      if (gamePhase === 'playing') {
        updateEnemies(delta);
        updatePlayer(delta, elapsed);
        updateBullets(delta, elapsed);
        updateBombs(delta);
        updateDivers(delta);
        updateUFO(delta);
        updateExplosions(delta);
      } else {
        updateExplosions(delta);
      }
      checkPhase(delta);
    }

    function render(elapsed) {
      if (isNaN(elapsed) || !ctx) return;
      // Background
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, W, H);

      renderGround();
      renderBarriers();
      renderEnemies();
      renderUFO();
      renderUFOBombs();
      renderBombs();
      renderBullets();
      renderExplosions();
      renderPlayer();
      renderHUD(elapsed);
      renderScanlines();
      renderGameOver();
    }

    function gameLoop(timestamp) {
      try {
        if (!startTime) {
          startTime = timestamp;
        }
        const elapsed = timestamp - startTime;
        const delta = Math.min(timestamp - lastTime, 50); // cap at 50ms to avoid spiral
        lastTime = timestamp;

        update(delta, elapsed);
        render(elapsed);

        if (elapsed < TOTAL_DURATION + GAME_OVER_DURATION) {
          requestAnimationFrame(gameLoop);
        }
      } catch (e) {
        console.error("CRITICAL ERROR in gameLoop: ", e);
      }
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
