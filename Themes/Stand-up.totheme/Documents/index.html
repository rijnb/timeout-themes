// === CANVAS SETUP ===
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr, groundY;

function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    groundY = H * 0.72;
}
window.addEventListener('resize', resize);
resize();

function setLineStyle() {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.fillStyle = '#fff';
}

function drawGroundLine() {
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();
}

// === CHARACTER SYSTEM ===
function lerp(a, b, t) {
    return a + (b - a) * t;
}

function lerpPose(p1, p2, t) {
    const result = {};
    for (const key in p1) {
        if (typeof p1[key] === 'object' && p1[key] !== null) {
            result[key] = {};
            for (const sub in p1[key]) {
                result[key][sub] = lerp(p1[key][sub], p2[key][sub], t);
            }
        } else {
            result[key] = lerp(p1[key], p2[key], t);
        }
    }
    return result;
}

function smoothstep(t) {
    return t * t * (3 - 2 * t);
}

function drawCharacter(pose, x, y, facingLeft) {
    ctx.save();
    ctx.translate(x, y);
    if (facingLeft) ctx.scale(-1, 1);

    const s = H / 800;

    const hip = pose.hip;
    const shoulder = pose.shoulder;
    const neck = pose.neck;
    const head = pose.head;
    const elbow1 = pose.elbow1;
    const wrist1 = pose.wrist1;
    const elbow2 = pose.elbow2;
    const wrist2 = pose.wrist2;
    const knee1 = pose.knee1;
    const ankle1 = pose.ankle1;
    const foot1 = pose.foot1;
    const knee2 = pose.knee2;
    const ankle2 = pose.ankle2;
    const foot2 = pose.foot2;

    function line(a, b) {
        ctx.beginPath();
        ctx.moveTo(a.x * s, a.y * s);
        ctx.lineTo(b.x * s, b.y * s);
        ctx.stroke();
    }

    // Legs
    line(hip, knee1);
    line(knee1, ankle1);
    line(ankle1, foot1);
    line(hip, knee2);
    line(knee2, ankle2);
    line(ankle2, foot2);

    // Torso
    line(hip, shoulder);

    // Arms
    line(shoulder, elbow1);
    line(elbow1, wrist1);
    line(shoulder, elbow2);
    line(elbow2, wrist2);

    // Neck
    line(shoulder, neck);

    // Head
    const headR = (pose.headRadius || 14) * s;
    ctx.beginPath();
    ctx.arc(head.x * s, head.y * s, headR, 0, Math.PI * 2);
    ctx.stroke();

    // Nose - prominent La Linea nose
    const noseX = head.x * s + headR * 0.8;
    const noseY = head.y * s - headR * 0.05;
    ctx.beginPath();
    ctx.moveTo(head.x * s + headR * 0.5, noseY - headR * 0.35);
    ctx.lineTo(noseX + headR * 0.5, noseY + headR * 0.1);
    ctx.lineTo(head.x * s + headR * 0.4, noseY + headR * 0.15);
    ctx.stroke();

    // Eye
    const eyeX = head.x * s + headR * 0.25;
    const eyeY = head.y * s - headR * 0.2;
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, 2 * s, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

const WALK_CYCLE = [WALK_CONTACT, WALK_DOWN, WALK_PASSING, WALK_UP];

function getWalkPose(cycleTime) {
    const numPoses = WALK_CYCLE.length;
    const segment = cycleTime * numPoses;
    const idx = Math.floor(segment) % numPoses;
    const frac = segment - Math.floor(segment);
    const nextIdx = (idx + 1) % numPoses;
    return lerpPose(WALK_CYCLE[idx], WALK_CYCLE[nextIdx], frac);
}

function getWalkWithCupPose(cycleTime) {
    const pose = getWalkPose(cycleTime);
    pose.elbow1 = {x: 12, y: -36};
    pose.wrist1 = {x: 18, y: -30};
    return pose;
}

// === SCENE OBJECTS ===
function drawDesk(deskX, surfaceY, s, knobPressed) {
    const deskW = 100 * s;
    const legW = 4 * s;
    const surfaceH = 4 * s;
    const surfScreenY = groundY + surfaceY * s;

    // Surface
    ctx.beginPath();
    ctx.moveTo(deskX, surfScreenY);
    ctx.lineTo(deskX + deskW, surfScreenY);
    ctx.lineTo(deskX + deskW, surfScreenY + surfaceH);
    ctx.lineTo(deskX, surfScreenY + surfaceH);
    ctx.closePath();
    ctx.stroke();

    // Left leg
    ctx.beginPath();
    ctx.moveTo(deskX + 8 * s, surfScreenY + surfaceH);
    ctx.lineTo(deskX + 8 * s, groundY);
    ctx.stroke();

    // Right leg
    ctx.beginPath();
    ctx.moveTo(deskX + deskW - 8 * s, surfScreenY + surfaceH);
    ctx.lineTo(deskX + deskW - 8 * s, groundY);
    ctx.stroke();

    // Knob/lever
    const knobX = deskX + 4 * s;
    const knobBaseY = surfScreenY + 14 * s;
    const knobLen = 10 * s;
    const knobAngle = knobPressed ? 0.4 : -0.3;
    ctx.beginPath();
    ctx.moveTo(knobX, knobBaseY);
    ctx.lineTo(knobX - Math.cos(knobAngle) * knobLen, knobBaseY + Math.sin(knobAngle) * knobLen);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(knobX - Math.cos(knobAngle) * knobLen, knobBaseY + Math.sin(knobAngle) * knobLen, 3 * s, 0, Math.PI * 2);
    ctx.stroke();
}

function drawMonitor(deskX, surfaceY, s) {
    const deskW = 100 * s;
    const monW = 36 * s;
    const monH = 28 * s;
    const standW = 6 * s;
    const standH = 8 * s;
    const surfScreenY = groundY + surfaceY * s;
    const monX = deskX + deskW * 0.55 - monW / 2;
    const monY = surfScreenY - standH - monH;

    ctx.strokeRect(monX, monY, monW, monH);

    ctx.save();
    ctx.fillStyle = 'rgba(255, 255, 255, 0.06)';
    ctx.fillRect(monX + 2, monY + 2, monW - 4, monH - 4);
    ctx.restore();

    const standX = monX + monW / 2 - standW / 2;
    ctx.strokeRect(standX, monY + monH, standW, standH);

    ctx.beginPath();
    ctx.moveTo(monX + monW / 2 - 12 * s, surfScreenY);
    ctx.lineTo(monX + monW / 2 + 12 * s, surfScreenY);
    ctx.stroke();
}

function drawChair(chairX, s) {
    const seatW = 36 * s;
    const seatH = 4 * s;
    const seatY = groundY - 28 * s;
    const backH = 32 * s;

    ctx.strokeRect(chairX, seatY, seatW, seatH);

    ctx.beginPath();
    ctx.moveTo(chairX, seatY);
    ctx.lineTo(chairX - 4 * s, seatY - backH);
    ctx.lineTo(chairX + 4 * s, seatY - backH);
    ctx.lineTo(chairX + 6 * s, seatY);
    ctx.stroke();

    const pedestalX = chairX + seatW / 2;
    ctx.beginPath();
    ctx.moveTo(pedestalX, seatY + seatH);
    ctx.lineTo(pedestalX, groundY - 6 * s);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(pedestalX - 16 * s, groundY);
    ctx.lineTo(pedestalX + 16 * s, groundY);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(pedestalX - 14 * s, groundY, 3 * s, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(pedestalX + 14 * s, groundY, 3 * s, 0, Math.PI * 2);
    ctx.stroke();
}

function drawCoffeeMachine(machineX, s) {
    const mW = 30 * s;
    const mH = 50 * s;
    const mY = groundY - mH;

    ctx.strokeRect(machineX, mY, mW, mH);

    ctx.beginPath();
    ctx.arc(machineX + mW / 2, mY + 12 * s, 4 * s, 0, Math.PI * 2);
    ctx.stroke();

    const spoutW = 8 * s;
    const spoutH = 4 * s;
    ctx.strokeRect(machineX + mW / 2 - spoutW / 2, groundY - 18 * s, spoutW, spoutH);

    ctx.beginPath();
    ctx.moveTo(machineX + 4 * s, groundY - 2 * s);
    ctx.lineTo(machineX + mW - 4 * s, groundY - 2 * s);
    ctx.stroke();
}

function drawCup(cupX, cupY, s) {
    const cupW = 10 * s;
    const cupH = 10 * s;
    const handleR = 4 * s;

    ctx.beginPath();
    ctx.moveTo(cupX, cupY - cupH);
    ctx.lineTo(cupX - 2 * s, cupY);
    ctx.lineTo(cupX + cupW + 2 * s, cupY);
    ctx.lineTo(cupX + cupW, cupY - cupH);
    ctx.closePath();
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cupX + cupW + 2 * s, cupY - cupH / 2, handleR, -Math.PI / 2, Math.PI / 2);
    ctx.stroke();
}

function drawCoffeeStream(machineX, progress, s) {
    const mW = 30 * s;
    const streamX = machineX + mW / 2;
    const streamTop = groundY - 14 * s;
    const streamBottom = groundY - 10 * s;
    const streamLen = (streamBottom - streamTop) * progress;

    if (progress > 0) {
        ctx.beginPath();
        ctx.moveTo(streamX, streamTop);
        ctx.lineTo(streamX, streamTop + streamLen);
        ctx.stroke();
    }
}

// === PHASE CONSTANTS (seconds) ===
const P = {
    TYPING_END: 10,
    STANDUP_END: 14,
    WALK_TO_COFFEE_END: 22,
    PRESS_BUTTON: 24,
    POUR_END: 28,
    PICK_CUP: 30,
    WALK_BACK_END: 38,
    SET_CUP: 40,
    REACH_KNOB: 42,
    PUSH_KNOB: 44,
    DESK_RISE_END: 52,
    END: 60
};

function breathe(tSec, amplitude) {
    return Math.sin(tSec * 2.5) * amplitude;
}

// === MAIN LOOP ===
const startTime = performance.now();
const DURATION = 60000;

function frame(now) {
    const elapsed = now - startTime;
    const tSec = Math.min(elapsed / 1000, 60);

    ctx.clearRect(0, 0, W, H);
    setLineStyle();

    const s = H / 800;
    const deskLeft = W * 0.28;
    const deskW = 100 * s;
    const chairInitX = deskLeft - 24 * s;
    const machineX = W * 0.73;
    const machineW = 30 * s;
    const charSitX = deskLeft + 28 * s;
    const charStandDeskX = deskLeft + 40 * s;
    const charAtMachineX = machineX - 10 * s;

    let charX, charY, pose, facingLeft = false;
    let deskSurfaceY = -30;
    let knobPressed = false;
    let showCup = false;
    let cupX = 0, cupY = 0;
    let showStream = false;
    let streamProgress = 0;
    let chairXOffset = 0;
    let drawChairThisFrame = true;

    // ---- Phase 1: Sitting and typing (0 - 10s) ----
    if (tSec < P.TYPING_END) {
        charX = charSitX;
        charY = groundY - 28 * s;
        const typeCycle = (elapsed % 400) / 400;
        pose = typeCycle < 0.5
            ? lerpPose(POSE_TYPING_A, POSE_TYPING_B, typeCycle * 2)
            : lerpPose(POSE_TYPING_B, POSE_TYPING_A, (typeCycle - 0.5) * 2);
    }

    // ---- Phase 2: Stop typing, push back, stand up (10 - 14s) ----
    else if (tSec < P.STANDUP_END) {
        const phaseDur = P.STANDUP_END - P.TYPING_END;
        const phaseT = (tSec - P.TYPING_END) / phaseDur;
        const seatY = groundY - 28 * s;

        if (phaseT < 0.4) {
            // Lerp from sitting to push-back
            const t = smoothstep(phaseT / 0.4);
            pose = lerpPose(POSE_SITTING, POSE_PUSH_BACK, t);
            charX = charSitX;
            charY = seatY;
        } else {
            // Lerp from push-back to standing
            const t = smoothstep((phaseT - 0.4) / 0.6);
            pose = lerpPose(POSE_PUSH_BACK, POSE_STANDING, t);
            charX = lerp(charSitX, charSitX - 10 * s, t);
            charY = lerp(seatY, groundY, t);
        }
    }

    // ---- Phase 3: Walk to coffee machine (14 - 22s) ----
    else if (tSec < P.WALK_TO_COFFEE_END) {
        const phaseDur = P.WALK_TO_COFFEE_END - P.STANDUP_END;
        const phaseT = (tSec - P.STANDUP_END) / phaseDur;
        const walkStart = charSitX - 10 * s;
        const walkEnd = charAtMachineX;

        charX = lerp(walkStart, walkEnd, smoothstep(phaseT));
        charY = groundY;
        facingLeft = false;

        const cycleTime = ((tSec - P.STANDUP_END) * 1.2) % 1;
        let walkPose = getWalkPose(cycleTime);

        // Blend in from standing over first 0.5s
        const blendInT = Math.min((tSec - P.STANDUP_END) / 0.5, 1);
        if (blendInT < 1) {
            walkPose = lerpPose(POSE_STANDING, walkPose, smoothstep(blendInT));
        }

        // Blend out to standing over last 0.5s
        const timeLeft = P.WALK_TO_COFFEE_END - tSec;
        if (timeLeft < 0.5) {
            const blendOutT = 1 - (timeLeft / 0.5);
            walkPose = lerpPose(walkPose, POSE_STANDING, smoothstep(blendOutT));
        }

        pose = walkPose;
    }

    // ---- Phase 4: Get coffee (22 - 30s) ----
    else if (tSec < P.PICK_CUP) {
        charX = charAtMachineX;
        charY = groundY;
        facingLeft = false;

        const cupOnMachineX = machineX + machineW / 2 - 5 * s;
        const cupOnMachineY = groundY - 2 * s;

        if (tSec < P.PRESS_BUTTON) {
            // 22-24s: reach for button
            const t = smoothstep((tSec - P.WALK_TO_COFFEE_END) / (P.PRESS_BUTTON - P.WALK_TO_COFFEE_END));
            pose = lerpPose(POSE_STANDING, POSE_PRESS_BUTTON, t);
        } else if (tSec < P.POUR_END) {
            // 24-28s: waiting, coffee pours
            pose = {...POSE_WAITING};
            const b = breathe(tSec, 1.5);
            pose.head = {x: POSE_WAITING.head.x + b * 0.5, y: POSE_WAITING.head.y + b};
            pose.neck = {x: POSE_WAITING.neck.x + b * 0.3, y: POSE_WAITING.neck.y + b * 0.5};
            pose.shoulder = {x: POSE_WAITING.shoulder.x, y: POSE_WAITING.shoulder.y + b * 0.3};

            showStream = true;
            streamProgress = (tSec - P.PRESS_BUTTON) / (P.POUR_END - P.PRESS_BUTTON);

            showCup = true;
            cupX = cupOnMachineX;
            cupY = cupOnMachineY;
        } else {
            // 28-30s: pick up cup
            const t = smoothstep((tSec - P.POUR_END) / (P.PICK_CUP - P.POUR_END));
            pose = lerpPose(POSE_WAITING, POSE_PICK_CUP, t);

            showCup = true;
            // Cup moves from machine to hand
            const handX = charX + pose.wrist1.x * s;
            const handY = charY + pose.wrist1.y * s;
            cupX = lerp(cupOnMachineX, handX, t);
            cupY = lerp(cupOnMachineY, handY, t);
        }
    }

    // ---- Phase 5: Walk back to desk with cup (30 - 38s) ----
    else if (tSec < P.WALK_BACK_END) {
        const phaseDur = P.WALK_BACK_END - P.PICK_CUP;
        const phaseT = (tSec - P.PICK_CUP) / phaseDur;

        charX = lerp(charAtMachineX, charStandDeskX, smoothstep(phaseT));
        charY = groundY;
        facingLeft = true;

        const cycleTime = ((tSec - P.PICK_CUP) * 1.2) % 1;
        let walkPose = getWalkWithCupPose(cycleTime);

        // Blend in from standing over first 0.5s
        const blendInT = Math.min((tSec - P.PICK_CUP) / 0.5, 1);
        if (blendInT < 1) {
            // Create a standing-with-cup pose for blending
            const standWithCup = {...POSE_STANDING, elbow1: {x: 12, y: -36}, wrist1: {x: 18, y: -30}};
            walkPose = lerpPose(standWithCup, walkPose, smoothstep(blendInT));
        }

        // Blend out to standing over last 0.5s, and turn to face right
        const timeLeft = P.WALK_BACK_END - tSec;
        if (timeLeft < 0.5) {
            const blendOutT = 1 - (timeLeft / 0.5);
            walkPose = lerpPose(walkPose, POSE_STANDING, smoothstep(blendOutT));
            // Transition facing direction: at the very end, face right
            if (blendOutT > 0.8) facingLeft = false;
        }

        pose = walkPose;

        // Cup follows hand (account for facing direction)
        showCup = true;
        if (facingLeft) {
            cupX = charX - pose.wrist1.x * s;
        } else {
            cupX = charX + pose.wrist1.x * s;
        }
        cupY = charY + pose.wrist1.y * s;
    }

    // ---- Phase 6: Set cup, reach knob, push knob (38 - 44s) ----
    else if (tSec < P.PUSH_KNOB) {
        charX = charStandDeskX;
        charY = groundY;
        facingLeft = false;

        const deskSurfScreenY = groundY + deskSurfaceY * s;
        const cupOnDeskX = deskLeft + 70 * s;
        const cupOnDeskY = deskSurfScreenY - 10 * s;

        if (tSec < P.SET_CUP) {
            // 38-40s: set cup down
            const t = smoothstep((tSec - P.WALK_BACK_END) / (P.SET_CUP - P.WALK_BACK_END));
            pose = lerpPose(POSE_STANDING, POSE_SET_CUP, t);

            showCup = true;
            const handX = charX + pose.wrist1.x * s;
            const handY = charY + pose.wrist1.y * s;
            cupX = lerp(handX, cupOnDeskX, t);
            cupY = lerp(handY, cupOnDeskY, t);
        } else if (tSec < P.REACH_KNOB) {
            // 40-42s: reach for knob
            const t = smoothstep((tSec - P.SET_CUP) / (P.REACH_KNOB - P.SET_CUP));
            pose = lerpPose(POSE_SET_CUP, POSE_REACH_KNOB, t);

            showCup = true;
            cupX = cupOnDeskX;
            cupY = cupOnDeskY;
        } else {
            // 42-44s: push knob
            const t = smoothstep((tSec - P.REACH_KNOB) / (P.PUSH_KNOB - P.REACH_KNOB));
            pose = lerpPose(POSE_REACH_KNOB, POSE_PUSH_KNOB, t);

            if (t > 0.5) knobPressed = true;

            showCup = true;
            cupX = cupOnDeskX;
            cupY = cupOnDeskY;
        }
    }

    // ---- Phase 7: Desk rises, chair slides away (44 - 52s) ----
    else if (tSec < P.DESK_RISE_END) {
        const phaseDur = P.DESK_RISE_END - P.PUSH_KNOB;
        const phaseT = (tSec - P.PUSH_KNOB) / phaseDur;
        const eased = smoothstep(phaseT);

        charX = charStandDeskX;
        charY = groundY;
        facingLeft = false;
        knobPressed = true;

        deskSurfaceY = lerp(-30, -65, eased);
        chairXOffset = eased * -200 * s;

        pose = lerpPose(POSE_PUSH_KNOB, POSE_STANDING_DESK, eased);

        showCup = true;
        const deskSurfScreenY = groundY + deskSurfaceY * s;
        cupX = deskLeft + 70 * s;
        cupY = deskSurfScreenY - 10 * s;
    }

    // ---- Phase 8: Standing at desk, typing (52 - 60s) ----
    else {
        charX = charStandDeskX;
        charY = groundY;
        facingLeft = false;
        knobPressed = true;
        deskSurfaceY = -65;
        drawChairThisFrame = false;

        const typeCycle = (elapsed % 400) / 400;
        pose = typeCycle < 0.5
            ? lerpPose(POSE_STANDING_TYPE_A, POSE_STANDING_TYPE_B, typeCycle * 2)
            : lerpPose(POSE_STANDING_TYPE_B, POSE_STANDING_TYPE_A, (typeCycle - 0.5) * 2);

        // Subtle head look-at-screen motion
        const b = breathe(tSec, 1);
        pose = {...pose};
        pose.head = {x: pose.head.x + b * 0.3, y: pose.head.y + b * 0.5};
        pose.neck = {x: pose.neck.x + b * 0.2, y: pose.neck.y + b * 0.3};

        showCup = true;
        const deskSurfScreenY = groundY + deskSurfaceY * s;
        cupX = deskLeft + 70 * s;
        cupY = deskSurfScreenY - 10 * s;
    }

    // === DRAWING ORDER ===
    // 1. Ground line
    drawGroundLine();

    // 2. Chair (if visible)
    if (drawChairThisFrame) {
        drawChair(chairInitX + chairXOffset, s);
    }

    // 3. Desk
    drawDesk(deskLeft, deskSurfaceY, s, knobPressed);

    // 4. Monitor
    drawMonitor(deskLeft, deskSurfaceY, s);

    // 5. Keyboard
    drawKeyboard(deskLeft, deskSurfaceY, s);

    // 6. Coffee machine
    drawCoffeeMachine(machineX, s);

    // 7. Coffee stream (if pouring)
    if (showStream) {
        drawCoffeeStream(machineX, streamProgress, s);
    }

    // 8. Cup (if visible)
    if (showCup) {
        drawCup(cupX, cupY, s);
    }

    // 9. Character
    drawCharacter(pose, charX, charY, facingLeft);

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
